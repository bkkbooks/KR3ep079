front:
  text: 葉序先高祖臨症指南一書為錫山華君岫云所刻書成於乾隆丙戌風行海內余成童時涉獵及之不能識也後檢故紙得家藏方案一册魯魚亥豕所在多有謬誤此必指南選刊所遺者亦整置未暇究近年留心斯道因發篋讀之然後知先哲之所以享重名者久而彌光蓋自有在嘉慶丙子獲見天元醫案於研六齋周謝庵姨丈家精光騰躍嘆為希世之寶道光辛卯於城東陳順庵家復見方案摘録百十條簡潔高妙洵為門診之精華又不勝遺珠之嘆因思華君非同里又素不業醫能以數年採輯之勤沾丐後人厥功甚偉余為裔孫獨珍手澤而不公諸當世華君有知其謂我何但指南類症分編余則一無去取亦不分門別類自愧識淺不敢妄為選擇姑還舊觀且自來醫家臨證雖多豈能盡備而茲又篇帙無多乎其天元醫案中載馬元儀先生案頗多皆神妙與先祖方案如驂之靳另附於後自為一卷而祁正明王晉三兩先生之案亦附焉世有好學深思者或再搜來選刻則其功當不在華君下矣其拭目以俟之道光十二年歲在壬辰四月元孫萬青謹序
  hash: sha256:4d728b86d8917b279f8e91db221cd9bed0fe20c88bdefcb86c7f0308f128ada3
