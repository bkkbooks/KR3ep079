body:
  text: 石敘昔者竊聞之孫真人以神針療龍神之疾神龍感之贈以禁方三十孫因著千金方三十卷每卷中雜一龍宮方今人亦不能一一指出何方為龍宮所授惟相傳六味丸即禁方之一試以此方論之山藥之甘地黃之苦丹皮之辛萸肉之酸澤瀉之咸五味具備又以茯苓之淡調和之俾五臟六腑均受其益此其運用之妙誠不可思議哉由是知醫者之有方猶匠者之有斧斤繩墨非是無以成其事也吾鄉葉天士先生生在康熙初沒於乾隆十年工長桑之術身歷三朝名聞九域夫人而知之矣其謝世已九十餘年至今談方術者必舉其姓字以為仲景元化一流人也其生平所制方有萃録成編者其元孫納人等校而授梓問敘於豫夫人祖宗一言一行無非彝訓所存凡為子孫者必多方表章之以寄其數典不忘之志況方書為活人要術可以調元贊化而消斯民夭札厲疾之災者乎即如龍宮禁方非孫氏傳之世人又烏從而知之諺云施藥不如施方訥人晜弟斯刻不特表揚先澤亦有合乎昔賢善與人同之義又可緩乎哉是為敘道光丙申七月舊史氏石韞玉撰胡敘精氣神為人身之至寶醫能保人所寶則醫書真寶書也軒岐而下惟仲景稱聖為制方之祖嗣後英賢輩出各抒心得立法以啓後人方書充棟後之用法者能得古人法中之意而不泥於法則因病定方不執方以治病可也所難者在認症耳昔嘉言喻氏謂醫不難於用藥而難於認症故先議病後議藥丹溪朱氏著脈因證治一書亦以認症為先施治為後若但執某方治某病而至於何脈何因何症辨之不真焉能用之無誤寒熱虛實疑似甚多見病治病十無一效曷足怪哉吳中精於醫者代不乏人自葉香岩先生治稱神術百餘年來無有繼其傳者惜其生平濟人事殷無暇著述如臨證指南一書為門人所採輯久已風行海內今復見醫案存真三卷系其哲嗣訥人先生彙集家藏方案成編觀其施治之妙實由辨症之的其不惑於症之疑似治不違於法而又不泥於法者苟非根柢內經博涉諸家其烏能洞徹陰陽標本隨症立方神明於規矩若是哉至馬祁王三家醫案各抒精義制方附刊於後亦足資後人採擇此書誠可寶也書既成先生濟世之業與其哲嗣濟世之心並傳不朽而流澤孔長矣是為序道光丙申秋九月吳郡胡國英識
