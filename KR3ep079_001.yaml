body:
  text: 卷一通下下通脘中仍結上下格拒者乃上熱下寒古人用麻沸湯煮涼藥以解上濃煎溫補以治下使陽氣不脫鬱熱自罷今仿之黃芩小川連枳實上三味入滾水中煮五十沸即濾人參淡附子乾薑上三味煎濃汁一杯和入前藥服疝攻上觸必傾囊嘔物此胃中得食氣壅肝邪無以泄越得吐而解蓋木鬱達之也此番病發原自怒起其為肝厥何疑炒黑川椒炒小茴香川楝子橘核青皮汁青木香虛損心熱齶干咳嗽失血此天氣令降身中龍相反升下焦真氣不得收納故也惟寧神靜坐斯天君不動自得陰上承陽下降地天交而成泰矣紫胡桃肉坎氣糯稻根鬚北五味子白蜜今年七月秋暑未除初病頭痛身熱是暑由上竅傷及清陽醫藥當辛涼取氣同氣相求中上之輕邪自散無如辛溫苦寒清滋之類雜然並投水穀內蒸氤氳不解見症仍在身半以上軀殼之間非關臟腑大病第能蔬食十日可解上焦之郁川芎薄荷荊芥炭炒白芷蔓荊子菊花蒂元茶三錢煎湯代水精傷痿躄尻髀跗脛皆如槁木不知冷熱糞黑腸枯用潤劑通陰中之陽病人自覺熱從內起略有活動但系沉痼之病未許其能卻疾也鹿茸當歸枸杞子熟地虎骨膠舶茴香沙蒺藜牛膝脈澀小數質弱平昔喜飲酒性先入肝膽故易生嗔怒且塗次侍親煩勞鬱熱自情懷而升病屬郁勞惟怡悅為上用藥不易奏功桑葉川貝母粉丹皮山梔殼天花粉蜜炒廣皮胃主納脾主運能食不化泄瀉治在太陰脾臟此臟為柔臟陽動則能運凡陰藥取味皆靜歸地之屬反助病矣淡附子淡乾薑生益智生砂仁人參茯苓脈弦舌白吐涎食入膈上即湧出自述由動怒得之春病至霜降不愈心中反痛以肝病犯胃治法金鈴子延胡索良薑茯苓炒半夏砂仁殼形壯色白氣虛有痰痰阻經絡氣血不通經事三年不來古人治此必以調氣為先蓋氣為血帥也見病治病終亦無裨生臺術茯苓塊香附砂仁蒺藜製半夏淡水熬膏臨好以文火燉收清晨開水調服孕育已十一胎未到七七天癸已絕八脈不司約束脊腰痠痛足跗骨中麻痹間有帶淋畏熱此屬陰虛虎潛法治之熟地龜板虎骨膠知母當歸白芍黃柏牛膝虛損真陰內涸當戊己君火主令立夏小滿陽氣交併於上喉舌腫腐是陰不上承熏蒸膩涎吐咯不清皆五液之變由司氣感及軀質而然檢古方以仲景少陰咽痛例用豬膚湯用白虎法渴煩少減略飢必形神軟倦津液既遭熱迫陽明脈絡自怯當以清燥法清氣熱以涵液人參麥冬知母石膏生地阿膠甘草三日瘧是邪干陰經表散和解不能去病詢知不慎口腹食物之氣亦能助邪宜先理脾胃而廓清之桂枝木生鱉甲烏梅肉常山廣皮知母草果淡黃芩心悸如飢頭暈肢麻此乃內起肝風汗多淋漓氣弱陽泄近日肌浮腹大木傳土也仿丹溪養金制木使脾少賊邪之害阿膠天冬生白芍細生地麥冬明天麻菊花炭痘後四肢瘍毒延綿日久聚集環跳膝跗以至不能行走乃沉疴難愈之疾據述筋粗強硬不司舒展內經病能篇筋縱筋弛分寒濕濕熱之異但痘漿未化之毒混處血脈絡間兩年之久攻之決不應病夫四肢血少氣多初患當取陽明今已流入陰分遇風冷輒痛溫通逐邪理亦可通然男子未通精之歲必以生陰為要務調理方法宗錢仲陽麋茸六味壯陰通陽可以常進麋茸大熟地紅花當歸枸杞子杜仲粉虎脛骨牛膝二十日來以甘溫益氣養陰治脾營胃衛後天漸得知飢納食思瘧痢致傷下焦奇經八脈皆損是以倏起寒熱背部畏冷遇風必嗽痰陽維脈無以維持護衛衛疏則汗泄矣從虛損門治人參鹿角霜沙蒺藜補骨脂茯神枸杞炭鹿茸當歸身少腹瘕聚從左上升每月事將至經絡腹脅先痛自述嗔怒病加病在肝俞血海由氣逆血滯故年逾三旬未得孕育下焦時冷治當理氣血以調經若縷治病樣未免太拙當歸川芎木香麝香香附桃仁楂肉蔥白延胡索吳茱萸川楝子小茴香韭白水泛為丸益母草湯送悲憂哭泣致病不飢欲嘔病屬鬱症治當條達肝胃第胃為陽土肝寄相火雖結瘕氣燥熱未宜製半夏白茯苓炒丹皮炒神麯吳茱萸夏枯草黑山梔川連因嗔怒心胸痞脹三年左脅下堅凝有形偶觸勞忿則寒熱無汗此屬郁痹氣血延成肥氣治當宣通營衛流行脈絡佐入攻堅俾寒熱得止再議炒柴胡生香附半夏曲丹皮桃仁青皮薑汁炒梔仁生牡蠣臨服入鱉血五匙行走多動陽酒濕多變熱熱氣上升犯冒清竅頭蒙聤脹衄血成流上齶腐瘍久必漏卮世俗通套每用犀角地黃然酒性先入膽次及胃酒客性惡甜膩從苦降定議以苦能卻濕也桑葉苦丁茶連翹心荷葉邊丹皮射干瘧傷真陰七八年來每交春季即脊背肩胛脹痛入夏更甚冬寒乃瘥凡春夏之時天地大氣發泄至秋冬方始斂藏臟真既少升泄病來督脈行身之背自陰而及於陽但內傷不復未易見功惟養靜斷欲用藥可希漸效鹿角霜鹿角膠熟地炭菟絲餅青鹽柏子仁暑濕乃夏秋時令之病其邪先著氣分氤氳矇昧有形無質醫投攻奪乃有形治法氣傷陽損至今肢冷溏泄何一非陽微腫脹之徵此宜溫補下中莫治眼前人參白朮木瓜淡附子益智仁炒廣皮厚朴高年少腹氣衝脘下心肋時痛舌底流涎得甜味或靜臥少瘥知飢不食大小便日窒此皆陰液內枯陽氣結閉喻西昌有滋液救焚之議然衰老關格病苟延歲月而已醫藥僅堪圖幸大麻仁柏子仁枸杞子肉蓯蓉紫石英炒牛膝三陰瘧是陰分伏邪汗之清之不解但與膩滯補藥邪無出路遂致吐衄寒自背起督脈應乎太陽川桂枝熟半夏炒白芍炒黑蜀漆生牡蠣淮海水鹹土潮水土異氣自口鼻受入必聚募原濕邪久郁化熱陽明絡損血溢咳嗽視目黃面亮顯然濕熱變痰況病已數年若是陰虛必不能延久至今也從濕熱例治杏仁厚朴米仁赤茯苓塊滑石綿茵陳淋屬肝膽而酒性濕熱之氣肝膽先受滓汁次及腸胃濕甚熱鬱溺竅氣阻莖管窄隘久病積熱愈深不受溫補當忌酒肉厚味分利雖投不能卻病從經義苦味法濕參以解毒料豆皮牡丹皮黑山梔蘆薈龍膽草真青黛金銀花胡黃連陰虛汗泄精遺理應固攝但先哲澀固之藥必佐通滑以引導澀味醫知斯理者鮮矣熟地萸肉杜芡實五味子龍骨遠志茯神用豬脊髓金櫻子膏搗和為丸幼稚驚癇至十三歲患發每發必於子夜陽動之時想陰未充溢肝風乘陽冒亂神識痰涎上湧治痰清火無效蓋肝為腎子木中陰火燔灼腎液皆為上泛矣女子天癸得來斯病當有愈期大熟地懷山藥當歸身茯苓塊山萸肉紫石英丹皮澤瀉河車膠便濁精濁兩者迥殊據述素有夢遺濁發遺止則知精濁矣分清飲八正散治濁套藥與此無涉當固補下焦不必分利熟地遠志沙蒺藜線魚膠山萸肉覆盆子菟絲餅生龍骨茯苓塊臭穢觸入遊行中道募原先受分布三焦上下頭脹脘悶洞泄以芳香逐穢法藿香梗生香附茯苓皮白豆蔻飛滑石炒厚朴新會皮食下脘中噎阻背脅氣逆而痛脈右寸獨大據述由嗔怒致病當與清金制木形瘦津少勿用破氣燥血枇杷葉桔梗紫降香汁川貝蘇子生香附汁凡憂愁思慮之內傷不足必先上損心肺心主營肺主衛二氣既虧不耐煩勞易於受邪惟養正則邪自除無麻桂大劫散之理故內傷必取法乎東垣今血止脈軟形倦不食仍嗆咳不已痰若黏涎皆土敗金枯之象急與甘緩補法生黃耆炒白芍炙草飴糖南棗著左臥即咳甚是臟陰血液傷極用益氣甘藥者緣有形生於無形耳人參黃耆當歸白芍南棗炙草寒熱因經水不來而甚此內經謂二陽之病發心脾女子不月肌肉日瘦腹有動氣即風消息賁矣內損成勞非通經逐瘀所能愈也柏子仁歸身白芍桂枝桂圓肉生黃耆今年二三月久雨陰晦入山行走必有瘴氣濕邪著於脾胃腹中脹閉溏瀉夾積溺赤不爽目毗肌肉悉黃夫濕為陰邪郁久必熱熱自濕中而出當以濕為本治生茅朮炒厚朴豬苓草豆蔻新會皮綿茵陳澤瀉茯苓皮木香汁磨入精血五液衰奪陽化內風上巔則眩暈欲厥乘絡則四末瘀痹老年有此斷非攻邪可卻古方侯氏黑散取乎培實孔竅者緣此熟地杞子藕汁河車膠紫石英甘菊炭茯苓人乳粉熬膏不用蜜色蒼肉瘦形象尖長木火之質陰液最難充旺春間咳嗽雖系風溫外邪但既屬陰虧冬藏先已不固因咳逆震動浮陽上冒清空自阻用藥宜取沉靜質重填陰鎮陽方是閱方辛氣居半與磁石相阻蓯蓉陰中之陽亦非收攝不效宜矣大熟地靈磁石萸肉五味子牡丹皮雲茯苓阿膠懷山藥澤瀉龜板東垣謂瘧痢皆令脾傷以為寒為熱之邪由四末蒸犯中焦也蓋頭形象天清陽不曠故面目諸竅不和形寒汗泄將來浮腫腹大已瞭然在目矣人參茯苓熟附子淡乾薑厚朴澤瀉脈弦緩面目肌膚皆黃舌白滑膩胸脘膈間脹閉病名濕溫由瀕海潮濕氣入口鼻至募原分布三焦此為外因仍食水穀腥物與外入穢濁之邪兩相交混濕甚熱鬱三焦隧道氣血不通遂變黃色發汗不愈者濕家本有汗也清熱消導不愈者熱從濕中而起濕不去則熱不除也夫濕邪無形質攻滯乃有形治法其不效宜矣昔河間治濕熱必取乎苦辛氣寒蓋苦降以逐濕辛香以祛穢寒取乎氣借氣行不閉寒於內也當世醫者混以傷寒表裡為治殊不知穢濕氣入口鼻遊走三焦不與傷寒同治綿茵陳白豆蔻厚朴川通草廣皮白炒茯苓皮半夏曲塊滑石濕濁內蒸瘀熱發黃三焦壅遏濁氣迷漫又非有形質滯此辛香逐穢宣通是一定法日期既多恐濁閉神昏另以銀花湯化至寶丹二粒綿茵陳白豆蔻茯苓皮厚朴草果滑石杏仁木通鮮菖蒲根汁復診綿茵陳厚朴江枳實草果仁細木通黑山梔雲茯苓黃柏痰滯得穢濁膠結濕中熱起蒸變發黃脘中痞悶病在氣分兩進消導理氣面目黃色略減而痞結如故議與治疸疏滯兼以蘇合香丸逐穢為法茵陳草果仁枳實厚朴廣皮木通暮服蘇合香丸一丸三服復診生白朮茯苓塊茵陳豬苓厚朴滑石澤瀉稚年瀉血是飲食不調熱蒸於絡為腸胃之病肛痔亦由濕熱內蒸而致熱甚則陰液不充風熱上升故干嗆法當與甘寒之劑俾金水同出一源況肺熱必移大腸腎開竅於二陰也鮮生地地骨皮麥門冬金銀花穭豆皮肥知母下利皆令傷陰值沖年情念正萌遂患夢遺勞煩飢餒更甚以精血有形必從水穀入胃資其生長也診脈數面亮莖舉則精出溺後亦淋瀝是陰虛精竅不固因陽氣下墜所致議固下陰以和陽熟地旱蓮草生龍骨懷山藥杜芡實萸肉雲茯苓蓮蕊須金櫻子膏煉蜜為丸瘧後耳竅流膿是竅閉失聰留邪與氣血混為扭結七八年之久清散不能速效當忌葷酒濁味臥時服茶調散一錢患耳中以甘遂削尖插入口內銜甘草半寸許兩年前晨泄食入嘔吐此非有年體質之脾腎虛瀉可以二神四神治也蓋幼衝陽虛百中僅一耳今泄瀉仍然寒熱咳嗽失血天癸不來脈得弦數形色消奪全是沖年陰不生長勞怯大著無見病治病之理保其胃口以冀經通務以情懷開爽為要勿恃醫藥卻病熟地炭炒當歸炙甘草炒白芍淡黃芩烏梅肉黑楂肉脈細右濡左數少年形瘦肌槁遺泄是知識太早致精血難充臍左動氣食減易飢陰傷於下漸延中宮沉陰恐妨胃剛補慮劫陰男子精傷補陰參入柔劑溫藥取坎中寓陽之意鹿角霜龜腹版白茯苓構杞子柏子仁炙甘草沙蒺藜炒黑遠志脅痛咳則更甚漸次腹大堅滿倚左不能臥右此閃氣致閉便溏溺利已非腑實乃絡病也桂枝木炒厚朴新絳屑生牡蠣旋覆花青蔥管生香附雞內金三瘧留熱伏於厥陰絡中左脅瘕聚有形是為瘧母寐則驚惕若見鬼神夫肝為藏魂藏血之鄉熱邪內灼藏聚失司非攻補可療議清解血中之結以祛熱大生地柏子仁炒丹皮生鱉甲生牡蠣郁李仁炒桃仁脈數左促右小咳嗽已一年喉癢火升食減經水仍來從未生育凡女人以肝為先天肝陰不充相火上燔莫制嗽久痰帶紅絲皆勞怯勢成日見消爍清肺涼藥不效根本先虧也急養肝腎之陰不失延久之計烏骨雞大熟地麥門冬炒白芍清阿膠當歸身川貝母炙甘草地骨皮北沙參白茯苓焦黃柏雞去毛腸頭足翅入藥在肚內酒煮爛去骨用其藥肉搗曬重磨余汁打糊丸遺泄有夢屬心無夢屬腎據述氣火下溜即如溺出之狀莖管中痛熱氣上衝咽喉巔頂掀脹語言皆怯此任脈不攝衝脈氣逆治法引之導之攝以固之現在便溏食少勿投沉陰膩滯之藥砂仁炒熟地炒黑遠志肉炒蓮鬚元武版白龍骨鎖陽茯苓杜芡實以金櫻子熬膏為丸形勞悒鬱之傷脈得左部弦勁肝血膽汁已少目翳紅赤治以涼肝滋液穭豆皮菊花炭穀精草淡天冬枸杞子生地牙宣春發繼以喘促乃腎虛不能納氣歸元戌亥陰火寅卯陽動其患更劇閱古人書急則用黑錫丹養正丹之屬平時以溫暖下元方法人參熟地五味子胡桃肉熟附子舶茴香獨糞後血未已是為遠血宗仲景金匱例用黃土湯黃土生地奎白芍人參清阿膠川黃柏歸身泡淡附子病始足脛乃自下焦肝腎起病其形不腫則非六氣濕邪當從內損門痿躄推求萸地滋滯久服胃傷食減嘔逆皆因濁味滯氣而然經年不復損者愈損臟真不能充沛奇經八脈不司其用經云衝脈為病男子內結七疝女子帶下瘕聚夫衝脈即血海男子藏精女子系胞今精瀝內結有形是精空氣結亦猶女子之瘕聚也凡七疝治法後人每宗張子和但彼悉用辛熱與今之精空氣結迥殊久病形消肉脫議以精血有情涵養生氣鮮河車一具水煮搗爛入山藥建蓮末拌勻丸如桐子大清晨人參湯送下據述左脅痛引背部虛里穴中按之有形納食不得順下頻怒勞煩氣逆血鬱五旬以外精力向衰延久最慮噎膈議宣通氣血藥取辛潤勿投香燥即有瘀濁凝留亦可下趨當歸尾京墨汁桃仁泥延胡索五靈脂老韭白足跟筋骨痛不能履地漸至延及腰脊向患遺精此肝腎精血內耗將成痿躄也生精羊肉炒當歸身舶茴香老生薑靈樞經云人身陽氣不納入陽蹻穴則寤不得寐飲以半夏湯今宗之半夏秫米腸血腹脹便溏當臍微痛脾胃陽氣已弱能食氣不運濕鬱腸胃血注不已考古人如羅謙甫王損庵輩用劫胃水法可效真茅朮紫厚朴升麻炭炙甘草附子炭炮薑炭炒當歸炒白芍煨葛根新會皮以黃土法丸口齒骨骱不開咽喉痰壅溺阻肌浮是皆氣分閉塞經言諸氣膹郁皆屬於肺肺象空懸凡重劑竟走腸胃故久治不效麻黃杏仁滑石牛蒡子馬兜鈴生甘草射干馬勃瘀濁久留脾胃絡中黑糞自下肌色變黃納食漸減脘中時痛不易運化中宮陽氣日傷新血復為瘀阻夫脾臟主統血而喜溫暖逐瘀鮮效讀仲聖太陰九條僅僅溫下一法但溫後必以溫補醒陽否則防變中滿潯桂心煨木香生桃仁製大黃初以心動精泄久則關鍵滑溜食減至半業已損及中焦萸地滋膩滯胃下焦之陰未得其益中宮之陽先受其累至於黃柏味苦苦更傷陰當以妙香散加金箔治之為穩人參龍骨遠志茯神金箔益智茯苓硃砂甘草墮胎十八次衝任奇脈血液無存厥氣入絡為脹為痛或時沖逆犯膈八脈皆不為用淹淹漸成損怯徒欲止痛寬脹乃不明之論俗醫皆然真鹿胎枸杞牛膝淡蓯蓉當歸身沙蒺藜舶茴香潯桂心臍旁有塊仍流動按之軟或時攻脅刺痛外腎寒冷拘束病屬肝血腎精之損凡腎當溫肝宜涼腎主藏納肝喜疏泄收納佐以流通溫腎涼肝是此病制方之大法當歸身枸杞子生牡蠣炙鱉甲小茴香沙蒺藜產後腹堅有形氣聚不通漸成脹滿乃衝脈為病其大便秘阻血藥潤滑不應柔膩氣愈凝滯考徐之才云腎惡燥以辛潤之當歸身精羊肉舶茴香老生薑久嗽形寒行走喘急是下焦先損入冬陽不潛伏喘甚失音胃納頗安溫養元海佐其攝納若以清肺散邪食減胃傷必致敗壞炒熟地雲茯苓胡桃肉牛膝鹿鞭淡蓯蓉炒黃枸杞厥陰犯胃則陽明空虛仲景云入谷則噦與吳茱萸湯泄肝救胃即史書圍韓救趙同旨吳茱萸淡乾薑炒白芍雲茯苓人參勞煩繼以悲哀經阻三月是二陽之病發心脾當歸澤蘭白芍川芎香附楂肉接服柏子仁丸精腐瘀血阻閉溺竅為痛似淋非淋久則陽維脈傷寒熱起五液枯耗為便難乃虛症也鹿茸淡蓯蓉柏子仁枸杞子沙蒺藜茯神當歸接服鹽水炒骨脂淡蓯蓉沙蒺藜枸杞子厚杜仲茯神鹿茸龜板丸方河車膠沙蒺藜龜板水煮熟地麋茸茯神蓯蓉味過於酸肝木乘胃嘔逆心痛用大建中法人參淡乾薑茯苓桂木炒黑川椒生白蜜邪與氣血交凝則成瘧母病在絡自左脅漸歸於中焦木乘土位東垣謂瘧母必傷脾胃既成形象宣通佐芳香乃能入絡凡食物肥膩呆滯尤在禁例所慮延成中滿人參茯苓木香草果陳皮香附汁厚朴青皮肢冷湧涎臍上痛墜泄瀉而脈緩此為脾厥以辛香醒中兼解少陽之郁生益智香附汁厚朴柴胡煨木香陳皮邪灼膻中神迷譫語嘔痰牛黃丸竹葉燈心湯化服瘧發三日三月不止邪留在陰熱解無汗氣衝胸悶痰涎甚多問寒起腰髀及背部議從督脈升陽人參炒黑川椒鹿茸茯苓炒黑小茴炒當歸妊娠八九月胎吸母氣陽擾煩蒸心痛引入少腹謂之子懸失治有三沖三激之累柏子仁天冬肉女貞實茯神生地真陳阿膠秋深曾診擬議此病為里濕更傷瓜果辛甘寒分利脾陽又受辛寒之累致濁氣聚形頻遭食復陽屢被戕凡身中脾陽宜動動則運腎陰宜藏藏則固斯為病根局方大健脾丸仲淳資生丸多以補虛通滯芳香合用者取其氣通濁泄人參補正之力得矣人參茯苓益智仁煨木香厚朴新會皮秋季寒熱滯下總是長夏為暑濕病蓋夏令脾胃司氣治失其宜致腹滿泄瀉跗浮囊腫皆濕邪無以走泄阻遏流行氣機使然腫脹勢減仍不飢少食兼吐瘀濁痰血要知濕是陰濁久鬱於中必從熱化初傷氣分久而入絡病能篇中以濕腫屬脾以脾為陰土得陽乃運今氣困無以運行諸經腑為窒痹消則愈困補則壅滯當疏腑養臟為宜凡腑以宣通為補非徒偏熱偏寒治矣茯苓厚朴生穀芽新會皮生益智澤瀉兼用仲淳資生丸去黃連每早粥後嚼一丸約二錢食物滯於腸胃太陰陽氣不旋陶節庵用五積散因汗冷厥逆禁用攻表昨主溫通開滯氣頗應謂陽氣宜通也草果香附厚朴陳皮廣木香茯苓化服蘇合香丸血傷驟加驚恐氣鬱熱升風旋清神受蒙為厥凡厥皆隸厥陰今左股麻痹忽爽忽迷皆肝膽中相火內風未得寧靜病延數日左脈小濡熱勝津液暗傷不宜純與攻滌苦寒經旨以肝為剛臟與胃腑對待柔緩濡潤陽和液復可免癇症鮮生地石菖蒲柏子仁阿膠天冬茯神幼年久有遺精目疾不耐勞煩先後天未曾充旺秋季瘧邪再傷真陰冬月夜熱嗽痰失血不飢不食盜汗傷陽陽浮不藏漸干胃口皆久虛勞怯之象此恙屏絕酒色怒煩須安閒坐臥百日必胃口漸旺病可漸除古稱精生於穀食也北沙參女貞實茯苓炒麥冬米仁川斛芡實脈左細數而勁右數大而虛此腎精肝血內虧水不涵木陽夾內風暴起莫制指臂拘攣口目喎斜在左蓋肝風陽氣從左而升沖氣撞心消渴暈厥仲景列於厥陰篇中凡肝屬陰木必犯胃之陽土飲食熱氣入胃引動肝陽即病發矣此恙已六七年陰損已極必屏絕俗擾怡悅情懷然後滋養堪固其陰必有小效無驟期速功炒鬆熟地陳阿膠大淡菜萸肉五味芡實金櫻子粉客邸懷抱不舒肝膽郁遏升降失度氣墜精開為遺泄地萸龍牡鈍澀氣鬱者更郁理氣和肝獲效未經調理全功當今冬令溫舒收藏之氣未堅失血之後胸中隱隱不暢未可凝陰只宜降氣和血鉤藤鉤降香米仁鬱金茯苓杜蘇子丹皮炒桃仁形充脈弦飲食如常述左脅久脹上年腫突肌潰收結已來脅中痛脹仍發入夜更甚僅僅仰臥不可轉側此支脈結飲阻其周行氣機病根非外非內宜通其脈絡為是熟半夏青黛土貝母白芥子昆布海藻海浮石土瓜蔞仁蛤蜊殼粉竹瀝一小杯薑汁三十匙泛丸凡經脈直行絡脈橫行經氣注絡絡氣還經是其常度今絡脈窒塞閃爍為痛但在雲門上焦猶是清氣流行之所務取輕揚宣氣亦可無礙濕痰便血靈樞所謂上焦如霧桑葉蘆根冬瓜子米仁桃仁炒隨時服臥服威喜丸三錢中年飽食虛里穴痛脹引之吐出痛脹勢減必起寒熱旬日乃已夫脾主營胃主衛因吐動中營衛造偏周行脈中脈外參差遂致寒熱且納物主胃運化在脾皆因陽健失司法當暖中用火生土意再以脈沉弦細參論都系陰象有年反胃格脹清陽漸弱濁陰僭竊為多症脈屬虛溫補宜佐宣通守中非法生淡乾薑茯苓人參熟半夏白粳米勞怯形肌日瘁食減自利腹痛寒熱由陰虛已及脾胃無治嗽清滋之理姑以戊己湯加五味攝陰為議是難愈之症炒白芍炙甘草北五味久痢肛墜診脈左堅沉溫劑不受陰傷不司收納前用桃花湯少減當與甘酸柔緩人參炙甘草熟地炭柿餅炭五味子肩背肢末皆陽氣遊行之所牽制不和是絡脈中病首用東垣舒經接用參耆朮附兩法不應必客氣襲入脈中灸刺無功議用酒醴通和血脈鑽地風五兩千年健五兩大黑豆六兩三味投入無灰酒十斤隔水煮一日早晚暖服三四杯伏邪留於少陰厥陰之間為三日瘧百日不愈邪傷真陰夢遺盜汗津液日枯腸燥便難養陰雖似有理但深沉瘧邪何以追拔掃除議以早服仲景鱉甲煎丸三十粒開水送午後服養陰通陽藥用復脈湯加減生牡蠣鹿角霜酸棗仁阿膠麥冬炙草生地桂枝大棗脈沉而遲向有寒疝瘕泄繼而腸血不已漸漸跗臁麻木無力此因膏粱酒醴釀濕內著中年腎陽日衰肝風肆橫陽明胃絡空乏無以束筋流利機關日加委頓乃陽虛也仿古劫胃水法生茅朮人參厚朴生炮附子陳皮狂癇陡發莫制病去諸事皆清發時面青食少議泄肝膽龍薈丸二錢半十服有夢遺精治在心腎乃二氣不交所致冬令牙宣亦主藏納淺鮮用鎮固寧神方熟地棗仁茯神金箔人中白女貞子湘蓮子旱蓮草遠志龍骨蜜丸脈虛澀咽中時痹不妨食物大便乾燥此肺中氣不下降不主運行消渴心熱皆氣鬱為熱非實火也枇杷葉蘇子蜜炙橘紅馬兜鈴茯苓川貝母病因食物不節其受病在脾胃既成形象在左脅之旁是五積六聚喜暖惡寒陽氣久傷溫劑必佐宣通食物宜慎草果蓽撥雞內金砂仁殼厚朴廣皮阿魏搗丸瘧發六七十候寒熱邪聚必交會於中宮脾胃陽氣消乏致痞脹不能納食運化三年不愈正氣未復診脈沉微陽傷必濁陰盤踞但以泄氣寬脹中州愈困愈劇必溫通濁走陽回是久病治法生淡乾薑生益智厚朴茯苓人參泡淡附子脈大弦緩目黃納食後中脘滯痛腹鳴泄瀉夏病至深冬未安緣瀕海潮濕久蒸兼以懷抱少暢脾胃之陽日困所受水穀之氣少運清濁升降失度外因六氣未去留連脾胃內傷法當辛香調氣醒中陽氣流行濕鬱可去腥膻重味宜忌煎方杜藿香煨木香生茅朮草果陳皮生香附汁茯苓厚朴服十劑丸方生於術人參益智仁生茅朮砂仁茯苓小青皮厚朴新會皮瘕結在左腹形長大必大便得通脹滿可減年前詢病因嗔怒且久寡多郁以泄木調氣得效今冬又發用大針砂丸十日白晝頗減入夜大脹議通陽泄濁方法肉桂麝香阿魏青皮當歸鬚郁李仁川楝子蜜丸腎精下損乏陰氣上乘浮陽上灼咽喉痛痹有喉宣發現咳嗽喘促是下焦元海不司收納衝脈之氣上衝所致故日進潤劑望其咳減為庸醫之良法實釀病之禍階現在胃弱便溏則非治嗽可療矣勞怯不復當以固真納氣培扶胃口希冀加谷則吉人參茯苓芡實坎氣湘蓮子秋石五味子胡桃冬溫咳嗽忽值暴冷外寒內熱引動宿痰伏飲夜臥氣衝欲坐喉咽氣息有聲宜暖護安居從痰飲門越婢法麻黃甘草石膏生薑大棗當風受涼遂致左偏麻木已經三載今年勢緩痛聚於腰寒冷煩勞痛甚此氣血凝遏壯年不為大害議以酒醒之是治風先治血之意當歸沉香川芎松節生於術海桐皮片薑黃黃耆桂枝羌活沒藥虎脛骨奔馳氣火乘絡失血用繆氏氣降使血歸經蘇子茯苓丹皮降香米仁茺蔚子桃仁藕節汁向來經水不調衝任脈病醫未明奇經脈絡久治無功後患陰瘧延虛經來色淡淋漓少腹攻觸㽲痛晨必瘕泄當通陽攝陰非破泄真氣偏寒偏熱之治鹿角霜補骨脂炒當歸小茴香炒黑白茯苓炒川椒紫石英淡肉蓯蓉便後純血食減力疲脈左堅是中年陰虧熟地炒白芍當歸柿餅炭炙草黴雨滂沱咽喉暴痛必因濕邪干肺痛止納食無礙咽水則嗆兼吐涎沫此痹阻在喉不在咽仍以輕劑理肺枇杷葉馬兜鈴通草米仁射干茯苓陽微陰聚致濁氣矇蔽清神苓桂不應議用大半夏湯合附子粳米湯法半夏人參白蜜附子白粳米據述瀉血五日血止即患咳嗆左脅下有形如梗身動行走必眩暈欲僕春夏減食秋冬稍加交冬人迎脈絡結癭診脈虛左關尺數此肝腎精血因驚恐憂勞所傷陽失陰戀絡中空隙陽化內風鼓動不息日就消爍不肯復為郁勞之症四旬以外生氣已淺非治病可卻春夏身中真氣不耐發泄可知屏絕家務開懷頤養望其病緩石決明女貞實杞子黑芝麻桑葉阿膠寄生柏子仁茯苓炒當歸冬溫為病乃正氣不能藏固熱氣自里而發齒板舌乾唇燥目微紅面油亮語言不爽呼吸似喘邪伏少陰病發三焦皆受仲景謂發熱而渴者為溫病明示後人寒外郁則不渴飲熱內發斯必渴耳治法清熱存陰勿令邪熱焚劫津液致瘛瘲痙厥神昏譫狂諸症故仲景復申治療法云一逆尚引日再逆促命期且忌汗忌下忌辛溫九日不解議清膈熱飛滑石連翹淡黃芩鬱金汁竹葉心天花粉橘紅苦杏仁耳聤環口浮腫是少陽陽明風熱久而失解邪漫經絡倏然疹現隨沒當與羅謙甫既濟解毒湯枯芩大黃防風銀花葛根升麻川連荊芥甘草陳酒浸半日陰乾煎陽明之脈主束筋骨而利機關今行走皆艱納穀甚少腹中氣攻頭痛自悲憂五年日加衰憊如靈樞經論痿云意傷憂悲愁則肢廢也枸杞當歸防風根黃耆沙蒺藜元參牡蠣羚羊角陽不交陰寤不成寐內風乘巔髓出鼻竅腥濁必絕欲經年可以卻病乃下焦病根歸脾湯永無效期仿丹溪法淡菜阿膠熟地龜板茯神天冬蓐勞下損損及八脈醫投清內熱滋陰致胃傷食減寒熱下焦沖氣上逆而咳嗽藥惟治肺與下虛內損並無干涉帶淋骨熱髓竭液枯蓐損較平常損怯更難寒暑更遷不復草木焉能奏功勉與血肉有情望其加谷望其悠久鮮河車一具人乳八兩生紫石英二兩血餘灰二兩秋石一兩人參煎湯送二錢怒傷肝恐傷腎二志交併真臟內損煩勞則陽氣擾動值春木之令絡血隨氣上溢失血過多陰氣下空陽無所附上觸清府致木反乘金咳嗆氣促肺俞惡寒脈弦數乃下損之疾山萸肉五味子咸秋石青鹽熟地瘧起四肢擾及中宮脾胃獨受邪攻清氣已傷不飢不食胃中不和夜寤不寐小溲赤濁即經言中氣不足溲溺為變須瘧止之期干支一周經腑乃和明理用藥疏痰氣補脾胃清氣轉旋望其納穀熟半夏生益智人參厚朴茯苓廣皮臨服入薑汁三分飲入脘膈鳴響唇乾漱不喜飲臍腹微痛晝欲寐夜不寐是脾胃未和陽氣不得下交於陰宣通氣分宗仲景腹痛必加芍藥以和陰人參白芍穀芽半夏曲黑芝麻霜桑葉茯苓陳皮今年浮腫腹脹泄瀉皆雨濕太過脾陽郁遏久則氣窒小溲不利凡分消健中調治其氣水濕自去脾陽漸復酒肉閉氣食物宜忌生白朮茯苓皮生益智椒目厚朴廣皮澤瀉豬苓服威喜丸稍安用涼潤劑不適想過進辛寒辛則傷肺寒則傷胃食入不化暖氣甚多咯痰氣閃欲痛大便澀少不暢流行既鈍必清陽轉旋得向愈之理蜜炙生薑茯苓炙甘草南棗桂枝米仁傷寒蓄血都是邪入於裡內經謂陰絡傷血乃下溢陰為臟病陰氣從下走泄陽氣失戀上冒遂令神識昏狂乃脫症也況在立冬大節之交關閱醫藥今朝所服猶是羌防葛根前此柴防服之屢屢身中陰陽遭此魔障劫盡焉有安逸之理雖急急收拾散越恐未穩追返耳人參茯神禹餘糧木瓜五味小麥八旬又四下元虛憊膀胱不開溺淋窒痛腎藏之陽通納皆少惟峻補元海可冀小效至於全好恐難深許當歸鹿茸茯苓柏子仁蓯蓉杞子熟地牛膝厥逆初平胃口下脘觸著便痛小便自利大便黑黏不爽前者經來暴止血海恐有凝瘀議以輕緩通血方法丹皮澤蘭桃仁料豆皮小生地薑汁昨日用交加散法黑血略下痛緩下移此瘀濁停留皆為痙厥以致紊亂氣血奇經失和矣但心悸舌赤陰分自虧宣瘀之藥多辛善走擇其辛潤者進商回生丹量進半丸亦對證穩藥細生地薑汁當歸鬚丹皮小茴桃仁料豆皮茺蔚子陽虛陰亦傷損瘧轉間日虛邪漸入陰分最多延入三日陰瘧從前頻厥專治厥陰肝臟而效自遺泄至今陰不自復鄙見早服金匱腎氣丸四五錢淡鹽湯送午前進鎮陽提邪方法兩路收拾陰陽仍有泄邪功能使托邪養正兩無妨礙人參生龍骨生牡蠣炒黑蜀漆川桂枝淡熟附子炙草南棗生薑此仲景救逆湯法也龍屬陽入肝蠣屬陰入腎收澀重鎮臟真自固然二者頑鈍呆滯藉桂枝以入表附子以入里蜀漆飛入經絡引其固澀之性趨走護陽使人參甘草以補中陽薑棗以和營衛也舌喑強縮乾涸無津邪氣已入膻中神識昏蒙積勞心血及虛致熱竟入矣診脈虛小無力俱補則熱閉今晚以至寶丹三分涼開水調化勻五六次銚服明日再議又心氣久耗營液暗傷漸枯涸窒塞小腸火腑失其變化傳導溲溺欲痛舌刺欲縮色仍白晦豈是血滯實火當滋液以救燔燥仍佐苦味以通火液鮮浙江生地元參竹捲心人參川連菖蒲百部桔梗又神氣消索五液枯寂此昏躁妄言乃陰陽不肯交合欲作脫象不忍坐視議三才湯以滋水源參入磁朱以寧神志三才加磁朱金箔又吸短欲躁午後至更深為甚熱入陰中子後清陽用事稍和自云心中不舒熱熏腳楚仿邪少虛多例用仲景復脈湯炙草生芍人參生地麥冬麻仁阿膠雞子黃脈微弱而細鼻準獨明晝日形冷汗泄不飢少納脘腹常痞泄氣自舒此陽氣失護衛而寒慄汗出陽失鼓運而脾胃氣鈍前進養營亦主中宮想因血藥柔軟陽不驟蘇初進甚投接用則力疲矣詢其不喜飲湯舌頗明潤非邪結客熱之比議用理中湯法專以脾胃陽氣是理不獨冶病兼可轉運日前之藥昔賢以瘧稱謂脾寒重培生陽使中州默運實治法之要旨人參生芍熟術附子茯苓乾薑產後六日惡露仍下每呵欠寒粟凡進湯必嘔逆舌粉白有苔面目四肢浮腫兼之消渴喜得涼飲胸脘痞悶不飢此臨產外邪乘虛竟入厥陰邪犯陽明狀如瘧證但產後虛弱值冬暖不藏之候得汗方解顯然客邪然柴胡動竭肝陰決不可用議和胃清邪一法製半夏鬱金新會皮天花粉杏仁竹茹努力絡傷身痛痰嗽失血最宜降氣通瘀最忌沉寒呆補紫降香末鬱金茯苓米仁蘇子桃仁入韭白汁十五匙產後下焦先虧腰膂如痿肛墜不爽此乃腎虛不攝痢血與脾病迥異攝固其陰略兼通腑熟地炭五味子茯神炒白芍炙甘草炒楂肉勞倦伏邪初起即用柴胡紫蘇三陽混散津液被劫熱邪上結胸中懊憹神煩譫語渴欲冷飲診得脈無神舌色白病在上焦氣分閱醫藥不分上下氣血況冬溫聘泄老人積勞七日未見病退機關此屬重症豈可藐視輕談瓜蔞皮黑梔子白杏仁鬱金香豉枳殼汁入冬天暖陽不潛伏質瘦脂虧稟乎木火血液既少內風暗動遂致眩暈麻痹陡然仆倒水不生木肝陽橫逆絡血流行右阻謂之偏枯忌用攻風逐痰清邪涼血漸致其和交節不反原可扶病延年犀角羚羊角鬱金元參連翹心鮮菖蒲川貝母橘紅冬溫失藏稚年陰虧陽亢三陰之陽當夜分升騰煩躁上熱不寧晝則安康人健宜用六味磁石方法生六味加磁石辰砂寒熱雖減脘中猶然不爽非是食滯乃氣結所致尚宜開上中之痹川連乾薑淡芩炒半夏杏仁白蔻枳殼桔梗此厥症也緣情懷失曠肝膽鬱勃陽氣直上無制夫肝脈貫膈入胃循繞咽喉今病發由脘至咽四肢逆冷所云上升之氣自肝而出中夾相火其病為甚法以苦降辛宣酸泄之治使陽和氣平之後接續峻補陽明此病必發稀以胃土久受木戕土虛則木易乘克也川連生芍吳萸烏梅橘紅杏仁肝風不熄都因天熱氣泄高年五液皆少不主涵木身中衛陽亦少擁護遂致麻木不仁丹溪所云麻屬氣虛血少便艱也苟非培養元氣徒以痰火風為事根本先怯適令召風矣議用三才湯合桑麻滋肝養血熄風治法天冬地黃人參胡麻桑葉首烏生用瞳神散大無光乃動怒陽盛致血耗水涸精采散越之象治宜養血斂液熟地五味萸肉茯苓女貞子白芍炙草丸方熟地五味茯苓磁石萸肉枸杞白芍青鹽龜膠丸此肝風夾陽上逆為厥得之惱怒驚憂屬七情之病厥陰肝脈貫膈乘胃是以脘中不飢不思納穀木犯土位也其頭暈目眩亦肝風獨行至高之地而精華之血不得營矣前用苦降酸泄辛宣病有半月不愈議兼重鎮主之川連吳萸炒白芍烏梅淡乾薑生牡蠣脾胃久虛不復泄瀉嘔逆不欲食喘促腹膨煩渴無寐是虛中夾暑最慮慢驚宜和補中土兼清暑熱必得嘔止瀉緩寢食得宜庶不致變人參廣皮木瓜大腹皮川連泡姜烏梅茯神形弱脈小腰痹痠軟足跟痛是下元精血暗虧未老先衰防致痿痹溫養宜柔勿以桂附剛愎蝗魚膠沙苑蒺藜甘枸杞子首烏茯神虎骨膠牛膝柏子仁溶膠為丸壯年形體充壯時見眩暈目淚暗出前議脈濡大便久溏用白朮益土桑葉泄木入冬尻骨跟痛耳鳴皆下少攝納當固其下虛不致內風自動九蒸首烏補骨脂炒黃甘菊菟絲子蝗魚膠蒺藜炒枸杞子膠汁搗丸久勞郁悖夏季尿血延及白露溺出痛澀血凝成塊阻著尿管夫淋症方書列於肝膽部為有濕熱阻其宣化氣機故治法苦辛泄肝淡滲通竅施於壯實頗效今望八老翁下焦必憊況加精血自敗化為瘀濁真氣日衰機竅日閉診候之際病人自述夢寐若有交接未嘗遺泄心陽自動相火隨之然清心安腎等法未能速效暫以清營通瘀宣竅之劑天冬生蒲黃龍膽草龜板生地阿膠丹皮焦黃柏頭中清竅痹窒風火夾陽上升味變酸濁明是火化火鬱發之治從經旨以茶調散一錢臥時用真苦丁茶一錢五分煎汁調服俾上竅內膜無阻冀有小效藁本辛夷蒼耳子蔓荊子川芎菊花苦丁茶為末凡熱甚而厥其邪必在陰分古稱熱深厥深病中遺泄陰傷邪陷發表攻裡斷難施用和正托邪是為穩法草果黃芩知母人參炒半夏五更時服高年氣血皆虛新涼上受經絡不和腦後筋掣牽痛陰氣安靜乃陽風之邪議用清散輕劑新荷葉青菊葉連翹殼藁本苦丁茶太陽開小水自利陽明傷則失其闔濁上逆四肢冷汗氣喘胸腹脹悶都是陽微欲脫脈絕厥逆勉與通脈四逆湯回陽驅陰以挽之淡乾薑泡附子人參豬膽汁服藥後脈微繼者生暴出者死初病伏暑傷於氣分潮熱渴飲邪犯肺也失治邪張逆走膻中遂至舌縮小便忽閉鼻煤裂血耳聾神呆昏亂邪熱蔓延血分已經入絡津液被劫必漸昏寐所謂內閉外脫連翹銀花石菖蒲犀角鮮生地元參至寶丹一粒遺泄陰虧瘧熱再傷陰分聲嘶火升易怒神躁水不潤木之徵何人飲佐降陰火制首烏知母天冬人參茯苓麥冬勞復虛寒泄下加以絕谷胃損絡血洞下昏亂無神脈診三五參差陰陽已屬脫根恐壞於子醜二時真氣不相維續勉用大封固一法人參熟附子生耆五味子於朮此吸受穢濁募原先病嘔逆邪氣分布營衛熱蒸頭脹身痛經旬至神識昏迷小溲不通上中下三焦交病舌白渴不多飲仍是氣分窒塞當以芳香通神淡滲宣竅俾穢濁氣由此分消耳通草豬苓茯苓皮米仁淡竹葉腹皮至寶丹熱久傷陰津液不承嗆咳舌紅罩黑不飢不食肌膚甲錯渴飲不休法當滋救胃液以供肺惟甘寒為宜麥冬南花粉白沙參冬桑葉蔗漿望色萎瘁晦黯聞聲呼吸不利語音若在甕中診脈右緩左急問初病忽熱忽溫頭中如裹腰痛欲拊捫神識呆鈍昏昏欲寐肢節瘛痙咳痰映紅溺溲短縮便溏帶血不飢不渴環口微腫唇乾不紅舌白糜腐此水穀酒腥濕熱相併鬱蒸阻撓清氣之遊行致周身氣機皆令痹塞夫熱邪濕邪皆氣也由募原分布三焦營衛不主循環升降清濁失司邪屬無形先著氣分時師橫議表邪宜汗里滯宜消見熱投涼殊不知熱由濕鬱氣行熱走仲景痙暍從濕化忌汗忌下明示後人勿傷陰陽耳但無形之邪久延必致有形由氣入血一定理也據色脈症參之未見或可採用羚羊角茵陳銀花連翹通草大腹皮茯苓皮豬苓澤瀉至寶丹產後下虛血病為多今脘中痞脹減食不適全是氣分之病但調氣寬中勿犯下焦為穩生香附汁蘇梗神麯豆蔻桔梗茯苓濁氣上逆噁心不食冷汗煩躁最防暴脫不可但執惡露滯滿而專泄氣攻血人參淡乾薑淡附子澤瀉衝入童便瘧有十二經然不離少陽厥陰此論客邪之傷若夾怫鬱嗔怒致厥陰肝氣橫逆其勢必銳經言肝脈貫膈入胃上循喉嚨而瘧邪亦由四末擾中故不飢不食胃受困也夫治病先分氣血久發頻發之恙必傷及絡絡乃聚血之所久病血必瘀閉香燥破血凝滯滋血皆是症之禁忌也切宜凜之青蒿生鱉甲炒桃仁當歸尾鬱金橘紅茯苓又方桃仁柏子仁新絳屑青蔥管歸鬚膈間腫橫如臂堅硬痛楚體髀䯒股皆腫經謂之伏梁又曰風根此下焦陽虛氣不能運化也此屬危症勉擬一方恐未能效淡川附蓽澄茄人參鹿茸茯苓脈左數上熱下冷淋帶不止此內熱濕鬱久則元虛花波羅滑為末漿丸即珍珠粉丸三錢孕婦忌服凡有痔疾最多下血今因嗔怒先腹滿隨瀉血向來糞結近日便溏是風木鬱於土位氣滯為膨氣走則泄議以理中湯泄木佐之人參附子茅朮醋炒柴胡炮姜地榆炭厚朴醋炒升麻瘀積於肝邪正錯亂臟腑之氣交傷而成膨疾腹脹氣壅擬禹餘糧丸破血泄肝通利二便治之禹餘糧丸十粒中虛陽郁胸膈不舒飲食不快擬逍遙散疏肝和脾使甲膽清陽上達生化氣行病可痊愈人參柴胡茯苓歸身炙黑甘草焦術廣皮丹皮炒白芍偏枯症風論云邪中五臟六腑之俞穴各入門戶為病則四肢不舉然陽主左而陰主右也又云汗出偏沮使人偏枯此外感之邪或營衛皆虛邪乘虛入或虛風內動皆有之醫者治之當補正以逐邪未可逐邪而不顧本元然治之之法以陽明為主生耆白芍當歸防風續斷萆薢蠶砂橘紅虎骨秦艽病熱汗出復熱而不少為身涼此非痎瘧狂言失志經所謂陰陽交即是病也交者液交於外陽陷於內耳此屬棘手症人參生地天冬關格者經言脈數俱盛四倍陰陽結邪相離而不復相管羸不及於天地之精氣則危矣極言關格之不可治前賢擬方亦皆未盡善愚意離愁鬱結病屬七情果難措手今此症由甘肥積熱酒性慓悍致傷臟腑津液治以清通清滋或尚可希冀川連生草栝蔞皮元參枳殼膽星苦丁茶柏子仁元明粉等分蜜丸自失血半年以來心悸怔忡脅左時動絡脈空隙營液暗傷議甘緩平補酸棗仁柏子仁桂圓肉生地茯神杞子炙甘草飢時服古人治脅痛法有五或犯寒血滯或血虛絡痛或血著不通或肝火抑鬱或暴怒氣逆皆可致痛今是症脈細弦數不舒此由肝火抑鬱火鬱者絡自燥治法必當清潤通絡潮栝蔞炒香桃仁歸身新絳炒白芍炙甘草脈轉勁舌乾赤噯氣不展狀如呃忒緣頻吐胃傷諸經之氣上逆填胸聚脘出入機逆周行脈痹肌肉著席而痛轉加平昔辛香燥藥不受先議治肺經以肺主一身之氣化耳炒香枇杷葉苦杏仁去皮炒二味水煎一杯許衝入桔梗枳殼汁天氣下降則清明地氣上蒸則晦塞上焦不行下脘不通周身氣機皆阻肺藥頗投者肺主一身之氣化也氣舒則胃醒食進不必見病治病印定醫人眼目炒香枇杷葉一兩桔梗一錢紫菀茸三錢炒杏仁三錢米仁三錢白通草一錢上藥煎清湯一杯渴飲不解經謂之膈消即上消症也言心移熱於肺火刑金象致病之由操心太過刻不寧靜當卻盡思慮遣懷於栽花種竹之間庶幾用藥有效生地天冬棗仁人參柏子仁知母金石斛生草元參腹中如有水狀行則腹鳴濯濯經言肺移寒於腎水氣客於大腸如囊裹漿按之不堅屬火衰陽虛不得轉輸於膀胱謂之湧水人參附子茯苓白朮乾薑炙草手足軟不能坐立是屬痿也痿症內經歷言五臟之熱髓枯骨軟治應苦堅滋營今之醫者多作陽虛治之痿症不愈皆由是也虎潛丸厥者脈動而身靜謂之屍厥此氣閉於外氣血未亂通其陽則生今厥而脈亂氣血並走於上如天地之郁則沙飛水湧莫之可當為之大厥此人身之根蒂空虛三陽並羸俟其氣返則生不返則危矣大熟地磁石代赭石五味子白芍人參河車
