body:
  text: 卷三夏至陰氣不生乃損不能復矣今當大熱氣泄愈甚百脈諸氣皆空脂液盡耗難望再醒為寒為熱無非身中陰陽互乘陽由陰上越則頂巔痛風木之火入中則嘔逆嗆咳總之液涸神竭進兩儀煎瓊玉膏扶至稍涼再為斟酌麥冬竹葉人參烏梅肉大麥鮮荷葉汁水煎澄冷服初春脈動而不鼓亦收藏之司淺矣壯年未育晨吐黑痰皆水虧火炎精氣不充之象胃旺能納穀當專理下焦不必以痰為慮牛骨髓羊骨髓海參膠線魚膠龜鹿膠芡實菟絲粉金櫻子粉五味子家韭子大熟地遠志肉建蓮肉淡菜膠熟首烏覆盆子下寒便難不寐液涸陽不潛伏用辛甘化風熟地歸身肉桂枸杞懷牛膝白芍茯苓甘菊蓯蓉柏子仁程舜文令郎男子思念未遂陰火內燔五液日奪但孤陽升騰熏蒸上竅已失交泰之義此非外來之症凡陰精殘備務在胃旺納穀生陰今咽喉耳鼻諸竅久遭陰火之逼寒涼清解僅調六氣中之火而臟真陰火乃閃電迅速莫遏清涼必不卻病良由精血內空草木藥餌不能生精充液耳豬脊髓阿膠川斛天冬生地胡樸庵脈動於右氣熱易升陰不上承能食不能充津液入春嗽血不止養少陰之陰勿苦降礙胃雞子黃阿膠生地炒柏葉炒黑麥冬茜草轉方加天冬抱木茯神上假熱下真寒肝腎大虛用加減八味丸熟地茯苓丹皮山藥五味當歸脈澀無神便溏食少肛有瘡瘍兩月未合已成漏症延綿竟有痼疾之虞近日嗔怒氣擾中焦隱痛至於耗氣劫奪萬難再餌議進東垣益氣湯減黃耆加木瓜白芍用薑南棗以制肝木脈數多遺脊痠腰墜此督任失固非通不能入脈非澀無以填精色蒼形瘦不宜溫補熟地牡蠣遠志五花龍骨五味茯苓芡實山藥羊腎脊髓肝腎兩虧虛火爍金用納氣法熟地牛膝白芍青鉛童便山藥脈數小不飢痰多陰虛伏熱滑石麥冬竹葉連翹杏仁鮮生地陰液枯槁陽氣獨升心熱驚惕倏熱汗泄議用復脈湯甘以緩熱充養五液人參阿膠炙草麥冬牡蠣麻仁細生地脈大不斂神迷囈語陰陽不相交合為欲脫之象救陰無速功急宜鎮固陰陽冀其蘇息生龍骨生牡蠣人參阿膠茯神淮小麥留熱未清營液已耗但論清邪恐神索氣奪膩滯陰藥防餘熱癰瘍議理心之用亦清補之意人參麥冬竹心淮小麥心中空洞下焦寒冷兼有遺精便溏議用三陰補方人參山藥炒茯神五味杞子炒建蓮線魚膠熟地炒脾胃陽微不運寒痰噫氣腎虛陰走遺精無夢人參山藥炒熟地炒建蓮生牡蠣龍骨枸子麋角膠男子脈大為勞暑月陽不伏藏初夏陽升血溢皆內損少固填精固氣是為藥餌靜攝絕欲經年可復線魚膠真沙苑五味龜板茯神淡萊膠金櫻膏石蓮芡實陳才交春三月每夜寒熱渴飲汗出是皆陰損於下孤陽獨自上冒也虛勞兼有漏瘍加以情懷悒鬱損傷不在一處少腹及腰肋痛議治在肝胃之間桃仁旋覆花丹皮新絳青蔥柏子仁許友官幼年瘍潰成漏後天不能充長其吐血後嗽不止夜熱晨汗熱止日見色奪肉消減食噁心便溏乃勞怯陰陽中下並傷草木藥餌何能挽回生生真氣難效之症人參山藥芡實炙草五味熟地炭寒熱半年少時色黃氣短咳嘔是內損營衛迭偏勞怯重病人參茯苓黃耆炙草煨姜南棗汪正中填固包舉遺精已緩新正勞煩氣泄病後神耗精奪當此升泄氣候以安神固攝法桑螵蛸金櫻子粉茯神人參生龍骨當歸身金箔龜板陳昇葵弟勞病先傷陰氣繼而陽傷夏季脾胃不和䐜脹腹鳴晨泄凡陽虛外寒陰虛熱蒸皆虛不肯復元之象非草木可為病人述腹中氣通小愈用藥當宗此旨人參穀芽茯苓白芍炙草新會皮右瘓舌喑足痱頭岑面戴陽呵欠微呃診脈小濡而緩此腎納失司肝風震突但病起耳後暴腫必兼溫熱客氣清上輕揚腫勢頗減七日以來當陰陽經氣一小周天不必以時邪引病為惑昔河間宣明方論中謂舌強難言其咎在乎舌下筋脈不主流動以腎脈縈及舌本耳其主地黃飲子取意濁藥清投機關漸靈並無礙乎上氣痰熱仿此為法熟地肉蓯蓉漂淡遠志炒黑川石斛茯神枸杞子牛膝石菖蒲脈象左部稍振水虧木中風動左牙痛蓋風從內旋乃陽之化風只以春深地氣上升之候多升少降無非下元不司收納虛證何疑況因目恙頻用韭子煙燻查本草藥性辛辣升騰助陽孫真人於遺濁用之藉其升陽以涵陰更無漏泄耳今痱中八日聲音漸振者乃精氣略有寧靜里竅略有靈機是順境也乃不明此理仍用辛以泄氣加人參亦是清散上焦之藥以肝腎臟虛在於至陰若再投辛以傷其陰必致虛症蜂起焉望其向安倘必以上有火熱古稱實火宜清虛火宜補溫養柔和與溫熱剛燥迥異幸勿疑訝生地川斛麥冬茯神阿膠女貞子十二日來干支一輪右肢痿木右跗足略有痛象舌竅未靈味少甘美虛象顯然三日前主家以齒痛為熱醫迎主見即投辛涼解散此症虛在肝腎下焦若不固納維本漫無著落仍以前法加入涼肝可也熟地枸杞牛膝遠志肉茯神川斛天冬甘菊炭張石頑治春榜趙明遠平時六脈微弱己酉九月患類中風經歲不痊邀石頑診之其左手三部弦大而堅知為腎臟陰傷壯火食氣之候且人迎斜內向寸又為三陽經滿溢入陽維之脈是不能無顛仆不仁之虞右手三部浮緩而氣口以上微滑乃痰沫壅塞於膈之象以清陽之位而為痰氣佔據未免侵漬心主是以神識不清語言錯誤也或者以其神識不清語言錯誤口角常有微涎目睛恆不易轉以為邪滯經絡而用祛風導痰之藥殊不知此本腎氣不能上通於心心臟虛熱生風之症良非燥藥所宜或者以其小便清利倍常以為腎虛而用八味壯水之劑殊不知此症雖虛而虛陽伏於肝臟所以陽事易舉飲食易飢又非益火銷陰藥所宜或者以其向患休息久痢大便後常有淡紅漬沫而用補中益氣殊不知脾氣陷於下焦者可用升舉之法此陰血久利之餘疾有何清氣在下可升發乎若用升柴升動肝腎虛陽鼓激膈上痰飲能保其不為喘脹逆滿之患乎是升舉藥不宜輕服也今舉河間地黃飲子助其腎通其心一舉而兩得之但不能薄滋味遠房室則藥雖應病終無益於治療也惟智者善為調攝為第一義熟地巴戟天蓯蓉山萸肉茯苓薄荷淡熟川附肉桂五味子麥冬川石斛遠志鮮石菖蒲脈左大右濡肝風震動陽明脈空舌強肢軟是屬中絡議用緩肝熄風連翹丹參元參茯神細生地羚羊角頭痛累月陽脈大陰脈澀此陰衰於下陽亢於上盛下虛之候也陽氣居上體本虛也而濁氣干之則實陰氣居下體本實也而氣反上逆則虛頭為清陽之位而受濁陰之邪陰陽混亂天地否塞而成病矣法用六味地黃湯加青鉛五錢頭痛經年不愈早則人事明瞭自午至亥神氣昏憒不寧風火之劑雜治無功兩脈俱沉且滑此太陰陽明痰厥頭痛也當用礞石滾痰丸間服導痰湯以盪滌其痰次以六君子湯少加秦艽全蠍調理而安五旬外不得安閒凡惱怒煩動多主五志之陽上舉而肝膽相火為甚幾年前制壯水之劑加磁石龜甲之沉潛乃乙癸同治之義今年暴暖多風風熱上搏清竅為蒙濕熱蒸為膿水此為客邪乘本體之虛治標宜輕揚以清上靜坐宅中可以向安連翹赤芍藥草決明羚羊角薄荷梗黃芩山梔皮荷葉梗飯後服里真氣衰不能貫通外膜致聲若甕中而蛙鳴蚊震之聲不絕前之流膿水時令濕熱氣加也今議補下鎮納收斂方法龜膠磁石牛膝牡蠣遠志菖蒲淡菜膠同蜜丸曹漢臣厥陰頭痛舌乾消渴心下煩疼無寐多躁小腹脹滿小便滴瀝時時痙搐最怕厥竭阿膠鮮生地雞子黃小黑豆皮煎半盞即以湯藥送滋腎丸三錢稚年陽有餘陰不足驟加驚恐厥陽直升為頭痛身不發熱二便自通豈是風寒停滯羌防葛姜辛溫混發陽經愈升其陽必致損目宜養陰藥周身掣痛頭不可轉手不能握足不能運兩脈浮虛浮雖風象而內虛者脈亦浮而無力以脈參症當是勞倦傷中陽明不治之候陽明者五臟六腑之海主束筋骨而利機關陽明不治則氣血不榮十二經絡無所稟受而不用矣衛中空虛營行不利相搏而痛有由然也法當大補陽明氣血不與風寒濕所致成痹者同治人參黃耆歸身甘草桂枝秦艽白朮患痛風發熱神昏妄言見鬼手足瘛瘲大便不行此少陰腎氣受傷也腎既受傷病累及肝肝旺火熾神明內亂木合火邪內入則便閉外攻則身痛法當滋其內則火自熄風自除痛自止生首烏蔞仁桂枝秦艽桔梗黃連知母枳殼服一劑症漸減但心神不安身體如在舟車此腎氣虛而肝肺為之不治正內經子虛母亦虛也母病子亦病也夫肝藏魂肺藏魄二臟不治故魂魄為之失守耳人參甘草生地麥冬遠志棗仁羚羊角川貝橘紅茯神患風三月周身流走作腫手不能握足不能履診其脈浮大而數發熱口乾此陰虛生內熱熱勝則風生況風性善行火熱得之愈增其勢傷於筋脈則縱緩不收逆於肉理則攻腫為楚也生地黃芩黃連酒炒紅花羌活左脈如刃右脈緩澀蓋陰虧本質暑熱為虐水穀氣蒸濕流肢末遂成攣痹已經泄瀉食減陽明脈中氣衰極矣緩治可以冀功生於術茯苓狗脊茅朮仙靈脾獨活防己靈仙濕痹絡脈不通用滲濕苦溫藥小效但汗出形寒泄瀉食減陽氣大衰可知難以濕甚生熱例治通陽宣行以冀脈絡流通生於術茯苓附子米仁金毛狗脊萆薢高年液涸風動酒濕氣蒸足趾曾經腐瘍經年來或麻痹或牽制不能轉側已成筋骨之痿兼之火升眩暈頭面清竅常似不爽大便艱澀四五日始一更衣陽氣不能潛伏陰液日就枯槁老來痿躄原無復元之法診得脈數動疾溫燥之補無益反害仿丹溪虎潛之制稍為加減冀得津液少存亦安閒永年之算非攻病也大生地一斤淡天冬三兩肉蓯蓉一兩五錢懷牛膝二兩生白芍三兩虎骨膠二兩柏子仁二兩肥知母一兩川黃柏一兩長夏濕痹經脈流行氣鈍兼以下元脈絡已虛痿弱不能步趨脊膂常似痠楚大便或結或溏都屬肝腎奇經為病蓋必佐宣通脈絡為正治法倘徒呆補夏季後必滋濕擾須為預理肉蓯蓉小茴香巴戟天歸身遠志鹿角霜桑椹子生茅朮茯苓熟地薑汁製另用金毛狗脊三斤煎膏和丸俞天音脈左大舌乾白苔腫痛流走四肢此行痹喘急不食二十日外矣羚羊角木防己白芍桂枝杏仁薑黃脈微而澀微為陽氣虛澀為陰血傷去冬已下肢獨冷步趨無力高年內乏藏納之司入夏身動加喘肉腠麻痹若蟲行此真陽失蟄胃陽失護生生意少豈攻病藥石所宜喻嘉言先生所謂大封大固莫令真陽泄盡而暴脫皆為此也錄嚴氏三因方人參白朮附子俞文調先生靈樞云神傷思慮則內脫意傷憂愁則肢廢皆痿症也脈形大虛無力常餌補陽而今操持縈思猶未能免病必遷延枸杞歸身甘菊桂枝虎骨交冬宜藏老年下虛二氣少續忽然右瘓舌喑面亮戴陽呵欠吸氣短欲嗆此非外來客邪皆根本先怯平昔眩暈肝臟虛風顯然水不生木坎中真陽內寓必溫理其下凡陽主乎通陰主乎攝扶過七日少陽生氣再振望其偏廢延永倘攻風劫痰之治非本氣自病法則人參熟附遠志茯神鮮菖蒲搗汁沖四十二歲右脈澀左脈微飲食不能健運噯嘔間或溏泄此中宮陽氣欲寂當用辛溫以補之人參乾薑茯苓淡吳萸胡蘆巴左脈弦大空虛右脈虛軟澀滯能食不能運便溏跗腫此係積勞傷陽壯歲經年不復當作虛症宜補脾腎治人參於朮茯苓煨益智淡附子白芍甘草乾薑胡蘆巴正氣已虛熱邪陷伏故間瘧延為三日其象為厥舌涸胸痹噦嘔恐成翻胃呃逆之症先以旋覆代赭鎮其上逆之氣以瀉心散其胸中之熱人參川連白芍旋覆代赭牡蠣陽氣結閉已成關格病屬不治姑用進退黃連湯上下合法黃連白芍桂枝人參頻頻勞怒肝氣攻觸胃脘胃陽日衰納食欲吐胃不主降腸枯不便仿仲景食谷則噦用吳茱萸湯人參黃連茯苓乾薑吳茱萸陽微嘔吐不飢人參半夏茯苓白芍淡附子春夏陽升肝木乘胃嘔吐吐不已寢食減廢氣失下降腸中不通病乃懷抱抑鬱兩月之久不敢再以疏泄為治人參川連烏梅川楝肉生白芍十九歲翻胃三月粒米不存左脈大空虛右脈細小虛澀納食少停即湧出口面白神瘁大便燥結此陰血枯槁陽氣鬱結已成膈症勉擬補中納下法人參於朮麥冬葦莖牛涎半夏益智茯苓發熱痰喘胸滿身痛左邊睪丸不時逆上痛不可忍肝脈弦急肺脈獨大此肺肝受邪之故也肝為木臟其化風其生火風火合邪旺於本位則為熱為痛乘於肺金則為痰為喘法宜滋達肺金兼疏肝木蔞仁紫菀半曲川貝桔梗枳殼杏仁蘇子柴胡秦艽狐疝淡蓯蓉枸杞巴戟茯苓沙蒺藜當歸茴香真肉桂陰莖作痛痛甚而憒診兩脈浮虛而澀浮為氣虛澀乃精傷陰陽兩虛得之憂思勞郁而傷中也經云陽明為氣血之海主潤宗筋又陽氣者精則養神柔則養筋今多悒鬱則氣必傷又任勞倦則血必耗氣血兩傷宗筋失潤故令作痛治以當歸補血湯加人參甘草秦艽桂心紅花繼用歸脾湯調理患溺血症已三月矣前用升補法不應右脈虛澀無神左關獨弦莖中作痛下多血塊形色憔悴又多噯氣據脈論症乃肝脾積熱也肝熱則陰火不寧而陰血自動以血為肝臟所藏而三焦之火又寄養於肝也故溺血莖中作痛脾熱則濕氣內壅而生氣不伸以脾為濕土之化而三焦之氣又運行於脾也故時時噯氣形色憔悴法當益肝之陰則火自平利脾之濕則氣自和生地白芍萆薢丹皮甘草車前繼用逍遙散加車前萆薢下血不已汗出躁煩心悸恍惚頭不安枕轉側不能兩脈虛澀虛為氣虛澀為陰傷人身陽根於陰陰附於陽兩相維繫者也今陰血暴亡虛陽無偶勢必外越矣虛陽外越而陰愈無主其能內固乎陰陽相離氣血兩虧法宜兼補然血有形難以驟致氣無形可以急固固其氣則氣自充氣充則不必治血而血自守矣先用歸脾湯繼以大造丸人參白朮茯神棗仁黃耆龍眼肉當歸遠志木香甘草生薑大棗寒熱如瘧便血不已左脅有塊攻逆不已而作痛脈弦數兼澀弦則為風數則為熱澀則氣結此肝脾之氣悒鬱不宣胸中陽和抑而成火故神明不精肝之應為風肝氣動則風從之故表見寒熱也人身左半肝腎主之肝風自逆故左脅攻楚有塊也肝為藏血之地肝傷則血不守且以風淫熱勝益為亡血之由也生首烏黃連柴胡黃芩知母枳實厚朴下血既久真陰大損臨晚熾熱而咳乃陽失潛伏宜甘酸益陰為治熟地炭甘草萸肉山藥五味茯苓芡實木瓜屢進潤血燥熄虛風藥諸症向安入夏四月苦於便難寒熱此夏令陽氣大泄陰液更耗虛風動灼為秘古人每以辛甘化風主治因體瘦不受溫補復以鹹苦味入陰之意鮮生地胡麻制首烏天冬柏子仁杞子茯神肥知母川斛膏面目悉黃微見黑滯煩渴腹滿左脈弦數右脈空大此內傷發黃為厥陰肝木太陰脾土二臟交傷之候也夫肝為風臟其性喜伸而惡屈鬱則木不得伸而屈矣鬱極則其氣盛而風乃發風發必挾其勢以賊脾脾為濕土之司土受克而氣不行則濕勝矣風性雖善行遇濕以留之反壅滯經絡而不解由是濕停熱瘀而煩渴有加其發黃也必矣雖曰風濕所致實由木亢而不寧土困而不舒非外來風濕之比況黑色見於面則知並傷其腎以脾病不行胃中谷氣入腎反將脾中濁氣下流故於黃中見黑滯耳即其腹滿亦是中氣不行虛熱內壅非結熱當下之比若誤下之則臟氣空虛風從內生矣若誤汗之則陽氣外解濕愈不能行矣為商治法平肝之亢扶土之虛兼解鬱熱以清氣道除濕蒸而和中氣人參白朮白芍黃連山梔歸身丹皮茵陳秦艽柴胡甘草半曲產後下損八脈交虛形寒內熱骨痛耳鳴血液日耗生氣不充冬季不得復元春深發泄司令延為勞瘵矣杞子歸身紫石英沙蒺藜茯神蓮肉產後陰傷寒熱瘧幾兩月病發白帶淋漓八脈空隙大著腹有動瘕下元虛憊已極議固下真通脈方人參鹿角霜茯苓歸身蓯蓉粗桂枝木產後十二日診脈數疾上湧下垂此血去陰傷孤陽上冒內風燔燎肝魂不寧面赤頭痛晝輕夜重陰弱陽亢上實下虛若不按法施治必增瘛痙厥逆議咸潤益下和陽方小生地生牡蠣淮小麥阿膠麥冬元參產後脈虛舌白背寒凜身痛乾咳不飢是血氣兩損不肯復元有蓐勞之慮急當培養足三陰臟莫以肺經咳嗽治再伐胃氣用貞元飲方熟地歸身炙草茯神杞子桂圓肉飢時服產後五十餘日腹滿不減膨脹愈甚二便不爽此因下焦空虛腑陽失氣化之司先宜通陽得脹勢稍緩再議方用五苓加椒目方此血痹之症產蓐百脈皆動春寒凜冽客氣乘隙襲入經絡始而熱勝繼則寒多邪漸陷於陰絡致夜分偏劇汗多神昏譫語由邪逼神明豈是小病正如仲景劫汗亡陽驚譫同例議救逆湯減芍藥方治產後絡脈傷腹痛頻發嗔怒食物不宜則甚當調和脈絡庶不延成痼疾宜蔥白丸胎殞陰損於下厥陽上泛久有夙病癇症心營肺衛最易矇蔽是神志或昏或清皆夾雜夙疾惡露自行豈是瘀痹姑用輕法以開上膈枇杷葉薏苡仁杏仁通草雲苓下焦陰虧不攝裡熱泄瀉厥陽上泛頭痛又產後兼病損甘草熟地茯神芡實山藥建蓮川斛蓐勞下虛溏泄近有風溫咳嗽發熱暫用手太陰上焦藥四五日桑葉沙參麥冬玉竹甘草扁豆久瀉無不傷腎況兼產後起因補中必當理下是為脾腎兩補五味子生杜仲雲茯苓杜芡實菟絲粉臺人參補骨脂焦白朮肝陽化風為厥腎液下衰水不生木而藏納失職此壯盛年歲已有下虛上實之象大意養腎主以溫潤治肝須得清涼乃仿複方之法大熟地茯苓遠志蓯蓉鹿茸柏子仁補骨脂懷牛膝黃柏天冬精羊肉煮爛搗為丸怒勞陽升暴厥苦降和陽使清神不為濁蒙便可清爽此論平時調理養肝腎之陰宜至靜之劑從經旨下虛上盛主治生地熟地龜板菖蒲遠志茯苓脈右澀左微色悴不華食減不能健運噯嘔溏泄此中宮陽氣欲寂法宜辛溫通補失治釀成中滿難調人參泡茱萸茯苓泡淡姜胡蘆巴驟然驚駭經府氣亂有失常度之流行是以腫脹無定所飲食如常病不在裡何得紛紛雜治調其氣血以俟營衛宣通桑枝遠志歸身桂枝鉤鉤白蒺藜病傷久不肯復食入不運脾胃之陽日困與治中法煨益智茯苓於朮廣皮白芍煨姜南棗脈沉右小左虛大臍上有動氣䐜脹不嗜食艱於大便此中氣大虛肝氣內變忌用攻伐消導宜泄肝和胃茯苓益智仁鬱金穀芽烏梅寒濕損傷脾陽遂成中滿之症乃淡泊不堪所致附子乾薑茯苓白芍胡蘆巴脈沉屬水初因食物之滯繼為下奪太速脾陽頓傷氣窒濕聚為腫脹矣大腹皮茯苓皮厚朴豬苓澤瀉老薑皮新會皮甜葶藶杏仁懷抱抑鬱營血受傷入暮脘痛喜按乃傷陰絡非實痛也柏仁桂圓茯神遠志廣皮精氣不足體質再加思慮鬱結心脾營血受傷口味甜血隨溢稍過飢脘中痛營主中焦宜以歸脾養營之屬人參大棗遠志茯神甘草歸身白芍桂圓脈左大堅弦肝風震動脾胃絡脈不和不知飢不安寐口流涎右肢腫當兼理中焦之絡議用茯苓飲法茯苓枳實人參炙草半夏廣皮遠志炭金式兼按太陽經之膀胱俞在脊骨間十九椎之旁小便後從茲出汗是太陽之氣不固也凡天將雨則頭眩目花經云頭眩其過在巨陽是清氣之不升也勞則夢寐不安而遺飲食不適意即作瀉是逆其志而運化失常此瀉在下焦統屬太陽病諸陽不能保舉而生種種之疾議茸珠丸大安腎丸理膀胱氣自必獲效鹿茸茯神人參蓯蓉萆薢菟絲餅秋石柏仁川斛補骨脂白蒺藜桑螵蛸吳文生胃中不和痛瀉茅朮厚朴廣皮木香炮姜茯苓豬苓澤瀉砂仁汪介臣鼻冷涕淚腹脹仍空形色衰奪脈微而澀陽氣已憊濁陰日聚為脹滿不食危期至速勉議通陽方法人參茯苓淡附子淡乾薑胃弱肝氣不和口中吞酸作苦食物無味擬進加味溫膽湯法溫膽湯加人參川斛脾胃不和腹膨痛夜自汗先疏利氣滯保和丸焦鍋巴陳茶薑湯下脈沉遲腫脹腹滿莖縮溺不利起於上年冬底痰飲咳嗽氣逆不得臥誤認腎虛水泛之恙療治遂致增劇難調勉擬進浚川丸以通水道得小便頻利冀其勢緩久瀉傷腎下午黃昏為甚非通套藥所宜擬溫腎法永隆號屢通大便脹勢不減是陽氣愈傷陰濁益壅矣進通陽法真武湯去白芍加澤瀉椒目腎陽虛則乏納氣之權濁陰凝痞少腹漸覺有形為脹脾陽虛則健運失司食少易滯受病既屬內傷固以理臟真為最要益火暖土使中下之陽得安迄今圖治至冬至一陽來復必獲全效川椒附子白芍茯苓甘草因時病而不慎口腹以致咳痰嗆逆肌肉消爍食下䐜脹甚則吐食而成虛損矣病在土不生金金衰則不制木互相戕克有不能起之象議以養金制木使中焦無賊邪之患壯火培土使上焦得清化之權亦是一法未知何如甜沙參淮小麥鮮蓮肉南棗懷山藥雲茯苓燕窩繼進方人參山藥白芍茯苓炙草南棗鮮蓮肉茹素胃弱向系肝陽熱熾今微眩耳鳴心怔議甘以養胃緩熱少佐酸味酸棗仁柏子仁炙甘草鮮白藕汁大生地甜細真北沙參大麥冬雲茯苓萸肉炭肝風上巔頭旋耳鳴麻痹足寒微嘔便澀經阻三年久病治從血絡中法茺蔚子柏子仁枸杞子料豆皮制首烏甘菊詢左脅下每日必有小痛逾時其痛勢布散胸臆背部從來不延及於腹中下焦是腑絡為病凡久病從血治為多今既偏患於上仍氣分之阻而致水飲瘀濁之凝此非守中補劑明甚但攻法必用丸以緩之非比驟攻暴邪之治當用穩法議以陽明少陽方法俾樞機開闔舒展諒必有裨益矣生鉤藤另研粉生香附水磨澄粉風化硝炒半夏茯苓生白蒺藜去刺竹瀝薑汁泛丸厥陰腹痛引胸脅便難睪丸腫當歸鬚延胡索小茴香桃仁泥川楝子官桂李隆吉客寒入於腸絡欲大便必先腹痛便解痛已旬日無溺氣下泄此屬腸痹公丁香柄柴胡木香白芍烏藥川楝子化入更衣丸五粒朱客肋稍隱隱痛臥起咳甚冷汗背有微寒兩足帶冷身體仰臥稍安左右不堪轉側此皆脈絡中病良由客寒閉其流行兩脈逆亂上犯過也治在血分通絡補虛枸杞子炒咸蓉干當歸小茴同炒黑桃仁炒炙山甲脈數重按無力左腰脅痛不能轉側舌苔白邊紅心中熱悶不欲飲是濕邪滯著經絡阻痹宜進氣分輕清之藥庶幾不傷正氣苡仁杏仁川貝佩蘭葉西瓜翠衣又脈數左腰脅疼未止舌苔黃昨進芳香輕劑略安仍不宜重藥佩蘭葉浙茯苓南沙參薏苡仁川貝又脈數無力左腰脅疼未止舌色轉紅是病邪雖稍緩卻陰氣已經不振進清餘熱略兼養陰方川貝淡芩麥冬阿膠川斛知母又案脈數無力左腰脅疼未止舌苔已退雖病邪稍緩但陰氣仍然不振議用清餘熱略兼養陰方川貝淡芩麥冬阿膠川斛元參胸中不爽是痰氣之阻仿小青龍法開太陽為主蓋少陰逆太陽氣化不至也五味炙草茯苓杏仁泡淡姜生白芍腑氣鬱滯為熱中宮少谷為虛腹滿溺濁口中味淡乃幼科五疳之病使君子一兩雞肫皮一兩肉果五錢川連五錢乾蟾一隻枳實五錢蕪荑五錢新會陳皮一兩山楂肉一兩白芍一兩人參三錢飯灰一兩水泛為丸米飲送下二錢每早空心服一服尖田人案腹痛三年夜分乃發發必腹滿嘔不出物繼而泄瀉此為脾厥脾為太陰之臟在臟體屬陰其運用則陽厥陰肝病必有前陰見症用治中法人參木瓜炮姜廣皮青皮生益智茯苓淋症愈後半年交五六月復發雖系肝膽鬱熱亦必是暑邪內蘊六腑皆為之不利胸腹如悶溺色赤混如血宜先清熱宣腑陽然後再調本病捲心竹葉寒水石車前子牛膝根廣橘紅黑山梔川鬱金滑石忍精而溺尿管閉塞此淋症也古云痛則不通用千金方法杜牛膝麝香三分研細調入久瀉欲嘔腹中有形升起痛楚小便不利喜食麥面皆肝厥內風襲胃之症緣稚年驚恐多煩多哭氣逆風旋蛔不自安而動久調必痊必當苦降辛宣酸泄風木得和脾胃可安東垣老人治脾胃必先遠肝木矣川黃連白芍烏梅乾薑桂木人參川楝子川紅椒炒黑為末烏梅肉為丸每服二錢米飲下忌食甘老人久嗽古人但以溫養脾腎未必以肺藥見病治病貽害但身小質薄絡脈單弱桂附雄猛液枯必犯肺瘍此溫劑通納為無弊耳薑汁製熟地四兩補骨脂一兩五錢枸杞子二兩懷牛膝一兩五錢茯苓四兩五味子一兩五錢胡桃肉霜三兩淡蓯蓉一兩車前子一兩五錢角沉五錢蜜丸淡鹽湯送下脈細有遺症是陰虛不主收納因沖氣上激為咳嗽肺藥無益今胃納頗好急宜填下絕欲安養尚可圖愈熟地枸杞建連茯苓山藥芡實胃病治法小川連三錢鹽水炒鹿角霜一兩炒當歸一兩淡姜五錢生香附二兩生曬茯苓二兩炒黑小茴一兩山楂肉二兩炒生川楝子肉一兩水泛為丸右足痛方此痿症也因肝腎兩虛陽明脈絡失用筋縮牽強足痛不堪動作當溫散下焦莫進疏解川烏北細辛萆薢乳香沒藥韭菜地上白頸地龍晚蠶沙煎湯泛丸每日服二錢陳酒下形瘦身長稟乎木火肝風內動夾火上巔忽然眩厥跌僕況陽舉遺濁陰分久虛擬壯水之主以治陽光法大生地大熟地天冬麥冬鹽水炒川柏痛脹甚於暮夜病根已在陰經從前溫補相安今則服之不應因以寒凝痰滯為患進神保丸即上吐下瀉此非有形之滯矣斯臟液日耗為虛腑經陽氣窒塞為實行痹日久時愈時發脈來六至濕熱居多今關節腫痛遊走不定是濕熱中又夾風火矣總宜養血清熱兼用風劑庶幾有中病情耳方失陽邪入厥陰之陰嘔逆二三日不止腹痛便秘發熱口乾手足冷麥冬蔗汁枳實沉香川連阿膠赭石人參韭白豭鼠糞痧是肺胃氣分邪火內迫津液上焦受損元未全復更為夏熱內蒸其血不必為陰虛治秋末入冬用清燥意天冬麥冬知母貝母水梨肉久嗽失音脈小痰冷沖氣入暮為重此肺虛氣餒不易驟愈酒家有飲邪桂苓甘味湯奔走煩勞暴熱上蒸致身中陽氣不交於陰四肢麻木內風屬陽之化左屬肝肝性剛柔劑為宜若用酒藥益助其動陽是矛盾矣生地天冬白藕汁沙蒺藜桑寄生女貞子炒枸杞川石斛夏月足跗肌浮是地氣著人之濕傷在太陰陽明初病失血繼而嘔涎拒食此脾胃濕傷漫延乃爾五苓散去澤瀉加益智厚朴滑石陳皮吳江陳三十八酒客脾胃自來不旺大便不實奔走勞動失血乃形色之傷止血理嗽無非清滋聲音日啞肺痿氣餒難治之症人參茯苓米仁灸草白芨黃精楓橋汪四十脅膈左右懊憹不舒嘔逆帶血凡人臟腑之外必有脈絡拘拌絡中乃聚血之地中年操持皆令耗血血不和氣氣攻入絡病狀難以自明宣通血分以和絡俾不致瘀著可免噎膈反胃新絳青蔥管橘葉桃仁瓜蔞仁鉤勾盪口四十六面黃白削瘦無神腹大臍突足冷腫重自言如著囊沙曾經用藥攻下下必傷陰而脹滿不減乃濁陰錮閉陽傷見症病在不治之條但用藥究宜溫熱以冀通陽泄濁生川附椒目炒乾姜炒小茴車前子長善濱歐詈大聲用力氣迸失音雖陰虛腦泄亦必用輕陽肅上桑葉枇杷葉生甘草象貝米仁沙參勞傷胃痛熟桃仁延胡索柏子仁當歸尾炒丹皮漏蘆楊十九沖年陰火未寧情志不和易於動怒氣火迸逆絡血隨之上溢問納食不旺氣衝血上必撫摩氣降血不出口但絡中離位之血恐致凝遏越日必氣升湧逆矣蘇子丹皮降香末炒桃仁米仁炒楂炭韭白汁紹興眷三十一少腹痛堅攻及當臍每午後必氣脹滯痛貫串腰尻環跳肉腠之間肌膚亦漸浮腫再問經事愆期僅得些微黃水是陰寒已入血絡病蓋起於產蓐累及奇經八脈身傴不直俯不能仰此肝腎入奇經之見症炒枯腎氣湯徽州四十六此痰飲宿病勞怒遇冷即發十年之久焉能除根桂苓五味甘草湯楓橋四十三此肝病也肝屬木主筋木臟內寄風火情志不適熱自內起爍筋襲脈肢體為之牽強不舒惟怡悅靜養可希漸愈藥無除根之理何首烏枸杞子桑寄生當歸身杜仲沙苑蒺藜師婆橋六十三寒入厥陰之絡結為氣疝痛則氣脹上升氣消絕無形跡老年下元已乏與破氣攻疝宜溫養下元為主尿管脹是阻溺當佐以通陽仿香茸丸法鹿茸麝香當歸青鹽韭子蛇床子覆盆子大茴香泰興二十八色脈是陰虛其喉妨食納乃陰乏上承熱氣從左上升內應肝腎陰火前議復脈法大便滑泄知胃氣久為藥傷不受滋陰必當安閒靜室以調之豈偏寒偏熱藥能愈人參茯苓扁豆木瓜石斛北沙參來安縣四十六病起痰飲漸為嗽喘外寒遇勞倦即發發必胸膈氣脹吐出稀涎濁沫病退則痰濃氣降乃已凡飲邪皆陰濁凝聚兩年之久漸漸腹中痞悶妨食肛門尻骨坐則無恙行動站立時時氣墜若欲大便顯系腎虛不能收攝惑於在前見痰治嗽苟非辛解即屬寒降乃致釀成錮疾腎氣湯加紫衣胡桃沉香汁吳趨坊四十五清竅在上焦氣分搐鼻宣通固是好法但久恙氣錮濕痰必生茶調散臥時服五分薄荷八錢川芎四錢荊芥四錢羌活二錢白芷二錢防風一錢五分細辛一錢炙草二錢茶調勻服海寧廿六勞怯是腎精內損真陰枯槁龍雷之火閃爍無制腎脈循喉屢受陰火燔灼必糜腐而痛冬無藏精春生亦無生髮胃氣已索草木何能挽回豬膚湯葑門三十九過勞熬夜陽升痰血在土旺之令中夜熱非外感脈尺中動左數肝腎內虛失收肅之令北沙參玉竹麥冬扁豆生草青甘蔗嘉善三十二肺痿失音形枯氣損用甘藥調和不宜辛散滋寒矣黃耆白芨米仁茯苓葑門六十九望七精力不及壯盛凡男子必下焦先虛跌僕致損乃系外傷筋縱骨短屈不能伸是足外踝留著瘀凝須俟夏月令瘍醫磁針砭刺可愈還少丹熟地山藥枸杞萸肉茯苓杜仲遠志五味楮實小茴巴戟蓯蓉石菖蒲加棗肉為丸唯亭十八讀書身靜心勞兼以夜坐浮陽易升年少雖未完姻然情欲一萌多致不自保惜陰中龍雷夾木中相火沸動失血咳嗽是臟陰不為寧謐暫緩書卷早眠晏起百日中勿加雜念擾亂可以全愈若以草木希愈非要領也知柏八味丸加五味子江寧廿一食已夕頃酸水湧嘔飢時不食又不安適此久病胃虛而陽乏運行濁陰凝聚使然春季以辛溫開導氣分不效思虛中挾滯泄濁溫通必佐養正苟不知避忌食物焉能取效吳茱萸淡乾薑茯苓熟川附小川連熟半夏陝西四十七痰飲乃陰濁所化以漸有形阻礙陽氣不得入於陰陽蹻穴空夜不熟寐靈樞用半夏秫米湯謂通陰交陽痰飲不聚也天王補心丹一派寒涼陰藥轉為濁陰樹幟矣護陽為要著仲景云凡痰飲當以溫藥和之小半夏湯加秫米同里五十三瘦人多燥癉瘧熱氣由四末乘至中焦胃中津液為邪熱劫燥不飢不食五味不美是胃陰傷也人身不過陰陽二氣偏則病離則不治矣人參麥冬汁知母生甘草糧船四十氣塞填胸阻喉不知不食問病起嗔怒寅卯病來臨晚病減凡氣與火必由少陽之木而升故上午為劇瓜蔞皮黑梔皮薄荷梗神麯新會皮青蒿梗淮安二十九性情古執氣鈍少靈慧凡心藏神腎藏精少年先病精神不易充旺宜用六味加遠志菖蒲開通心竅腎精俾得兩相交合流貞巷三十七眷上年五個月小產二次再加冬季服事病人產虛在陰勞傷在陽此咳嗽吐黏濁氣逆嘔食之由來也凡食入胃傳陽此咳是下虛不納氣衝湧水上泛胃乏運行食亦繼出奈庸工不明傷損陰中之陽僅僅消痰清肺一派寒涼必致胃倒敗壞桂苓甘味湯泰興三十七眷十年前因夜食凝滯閉氣食物遂胃脘痛嘔吐病發腹大如懷妊得氣後泄而脹消經准不孕來必腹痛病根全在氣分用藥必兼祛血分寒凝乃合病機吳茱萸秦椒川楝子高良薑延胡索蓬莪朮生香附南山楂生薑搗汁泛丸舟里五十肺痿聲啞胃減食入不安難治之虛損戊己丸東山六十血痹氣滯腹中不和而大便燥夏季以柔和辛潤交霜降土旺之運連次腹痛目眥變黃此非黃疸是濕熱瘀留阻壅乃爾炒桃仁郁李仁茺蔚子冬葵子菠菜葉淮安四十六食物有形之滯從胃入腸若心胸之下皆陽氣遊行之所因初起停食幾年疑惑其實陽不轉旋而致結痹栝蔞薤白白酒湯揚州四十四痰飲哮喘遇寒勞怒即發小青龍湯去麻黃木瀆三十二眷經水不來是絡脈無血古云氣旺血自生大忌通經人參歸身茯苓桂心鹿茸精羊肉膠和丸黎里四十四形色脈象確是陽虛酒食聚濕濕注入腸腸痔下血濕為陰濁先傷脾陽陽微氣衰麻木起於夜半氣血交代之時中年痱中大有可虞人參生於術炮姜炒黑附子炙甘草嘉興十八陰火必從晡暮而升寐中呻吟是浮陽不易歸窟形瘦食少盜汗攝固其下為是六味加阿膠人中白嘉興十一腎肝內損必致奇經失職俗醫混稱陰虛僅以錢仲陽小兒所用六味曰補陰和陽益臟泄腑要知此時仲陽非為虛損設立人參紫河車坎氣人乳粉秋石茯苓五味子紫衣胡桃婁門六十七左右為陽陰之道路向衰年歲操持經營且不獲利心境失暢氣血不和久則拘束為痛甚於夜者陽氣衰微入夜陰用事而病加也十二味養營法人參白朮茯苓炙草當歸白芍地黃黃耆陳皮桂心遠志海鹽四十二據述緣季秋外邪變瘧延及百日始愈凡秋瘧是夏月暑濕熱內伏新涼外觸引動伏邪而發俗醫但知柴葛肌暑濕傷在氣分因藥動血血傷攣痹筋熱則弛筋寒則縱遂致釀成痿痹難效症當歸身桑寄生生虎骨枸杞子撫芎沙苑蒺藜東山三十四精損於下陰中龍雷之火燃爍莫制失血後肛瘍膿漏即陰火下墜所致行走喘促涎沫上湧是腎不攝納真氣五液變沫湧逆無治痰治嗽之理扶胃口攝腎真乃為對病之藥人參茯苓坎氣五味子紫石英芡實胡蓮山藥閭門三十四舌粉白心中寒嘔酸不止理胃陽必佐泄肝逆吳茱萸川楝子生炒黑附子高良薑延胡索雲茯苓萬年橋廿八眷半產重於小產左脅下瘕形是氣乘肝絡攻之則變為中滿從前有震動胎墜嘔逆寒熱之傷今當培養氣血正旺則瘕自消不可怠忽致延勞怯當歸白芍鱉血制柴胡茯苓蒸於朮南棗炙甘草中由吉巷廿八眷案佚人參北沙參茯神青苧真紋銀關上十九氣泄用陽藥固氣若治嗽滋陰引入勞病一途黃耆建中湯加人參同里廿七幼年成婚太早精氣未充先泄上年泄瀉繼加痰嗽納食較少形肌日瘦今秋深喉痛是腎精內乏陰中龍雷閃爍無制當此秋令肅降藏職失司明歲穀雨萬化開遍此病危矣秋石拌人參生紫石英紫衣胡桃肉茯神女貞實五味子楓橋十八春正月寒威未去吸受寒氣先傷胸膈胃脘之陽食已噯噫陳腐酸濁之氣是清陽不為轉旋忌進黏腥厚味暫用蔬食數日蓽撥益智仁砂仁殼土蔞皮生薑江寧廿九病人述上年五月住直隸白溝河北方不比南地濕蒸則熱夜坐仍涼想是時寒熱亦是輕邪醫用滾痰丸下奪表邪閉結不出肺痿音啞喉癟咽物艱難仿徐之才輕可去實用有氣無味之藥射干生甘草大力子麻黃苗蟬衣囫圇滑石連皮杏仁無錫廿二嗽血秋季再發夜熱汗出全是陰虧見症大忌肺藥理嗽絕欲百日助其收藏胃口尚好腎肝陰藥中必佐攝納熟地五味子山藥芡實湖蓮茯神無錫三十脅痛失血以柔劑緩肝之急炒熟桃仁柏子仁當歸尾炒黑丹皮鉤藤鉤鳳陽三十八瘧後脾弱肝乃乘之中氣不舒所以易生嗔怒焦白朮生益智茯苓廣皮枳實皮檀香末水泛為丸徽州三十五仲景云厥陰病氣上撞心明示木中風火上行多氣少血陰虛之象治以癇症痰火有餘大謬女貞子天冬肉茯苓小生地山萸肉建蓮肉赤金箔淮安廿二露姜飲止瘧是益中氣以祛邪虛人治法皆然脾胃未醒宜忌腥酒濁味大半夏加益智橘紅薑汁泛丸崑山六十一老年形寒足痿嗆痰男子下元肝腎先衰真陰少承五液變痰倘情懷暴怒內風突來有痱中之憂戒酒節勞務自怡悅壯其下以清其上是根本治法熟地萸肉淡蓯蓉川石斛青鹽枸杞淮牛漆鹿角膠山西三十九夏季吐血秋深入冬頻發診脈右弦空左濡是形神兩傷絡血不得寧靜氣血因經營而耗不比方壯矣黃耆建中湯開門橋廿九織梭肢體皆動過勞則氣血不流偏倚為病在左脅痛失血肝絡傷瘀發久必重炒桃仁延胡索降香末炒丹皮鉤藤勾湖州廿四少壯病不復元失於保養延為勞嗽胃氣尚好可與填精固下都氣丸去丹澤加胡桃肉二仙膠吳江廿七肌肉日削竟夜內熱是內損陰虛漸延勞祛安逸可久天噯氣泄病必漸加早服牛乳一杯另服補陰丸寧波四十八七疝肝病為多病發有聲響為氣疝寒入募絡積疝堅硬下墜宜八味加大茴香胡蘆巴楓橋廿七眩暈嘔水心中熱神迷若癇皆操持運機君相升舉蒙冒清神生薑辛可通神但氣溫先升佐入涼降劑中乃可溫膽湯南潯廿三凡外熱入肺而咳嗽者可用表散藥若內傷累及於肺而致咳者必從內傷治汗之則泄陽氣肺痿音低顯然藥誤黃耆黃精棗仁白芨運漕四十四冬藏失司咳吐涎沫是腎病也醫見嗽咸以肺藥治嗽宜其年餘無效桂苓甘味湯黃家巷廿七色奪脈促寒露霜降嗽甚風冷形肌凜凜衛陽疏氣易泄也小建中湯徽州四十三操持太過肝腎浮陽上升乘胃寤不成寐金匱酸棗仁湯興化廿四肛瘍成漏年餘真陰五液皆傷納食在胃傳入小腸而始變化因咳痰不出必嘔盡所食乃已喉痛失音涎沫吐出喉中仍似存留明明少陰脈中陰火內爍上燔陰液蒸變涎沫內損精血醫見咳嗽音低咸進清金潤肺不明此咳嗆之原是速其篤已豬膚湯宣興十九瘧痢後脾胃兩傷用繆氏法雙補丸方齊門外三十眷上年產蓐無乳已見血虛之象延半年後經水不來少腹瘕氣有形病人自述背脊常冷心腹中熱視面黃色奪問食少不美夫督脈為陽脈之海由腰而起劑頸而還下元無力陽虛背寒任脈為陰海之沖虛攻入絡為瘕考內經圖翼病機宛然在目此產損蓐勞非是小恙無如醫不讀書見寒熱經閉而妄治淹纏日久速其篤已人參鹿角膠霜粗桂枝當歸小茴香炒枸杞子沙蒺藜白薇金匱十七夏伏暑濕秋季如瘧邪不盡解能食不化腹中氣滯有形脾胃不和用東垣清暑益氣法人參黃耆白朮青皮陳皮神麯炙草麥冬五味黃柏澤瀉當歸升麻葛根蒼朮薑棗煎太平四十九左脅有形漸次腹大每投攻下泄奪大便得瀉脹必少減繼則仍然不通頻頻攻下希圖暫緩病中脹浮下部加針刺以決水之出腫消病仍不去病患六年久已斷想此病之愈要知此病初由肝氣不和氣聚成瘕屢發攻瀉脾胃反傷古云臍突傷脾今之所苦二便欲出痛如刀刺蓋氣脹久下再奪其血血液枯氣愈結矣宣通宜以利竅潤劑琥珀屑一錢麝香一分大黑豆皮四錢杜牛膝一兩二便通後接服茺蔚子郁李仁杜牛膝當歸身冬葵子南京廿八環跳筋骨痠痛少年精傷陽維脈少護衛當歸巴戟生虎脛骨枸杞沙苑蒺藜川牛膝羊內腎搗橫涇三十勞傷虛體脹病初愈因動怒氣鬱不食二便皆阻從腸痹定議仿丹溪開肺法以肺主一身之氣化杏仁蘇子桑葉紫苑姜皮桃仁嘉興五十三情志內郁心痛如絞形瘦液枯不可氣燥熱藥炒桃仁柏子仁小胡麻炒丹皮延胡索鉤藤鉤中由吉巷四十七眷病人述自腰以下頹然痿躄肌肉麻木枯寂二便不爽上下氣不接續顯然崩漏亡血陽不下交於陰中年日就衰奪惟辛補潤燥冀絡虛氣攻痛勢漸緩郁李仁枸杞子肉蓯蓉冬葵子柏子仁桑寄生松子仁黑芝麻流貞巷四十九漏經繼下如卵形已見血損氣結按任脈為病女子帶下瘕聚少腹形象是也血傷忌投氣燥溫熱但血藥不取沉滯血中宣氣為是南山楂茺蔚子青蔥新絳生香附泰興三十七精未生成強泄最難充旺至今未有生育視形瘦問食少精薄易泄形脈不受剛猛陽藥議藉血肉有情溫養氣血鹿鞭羊內腎淡蓯蓉瑣陽生菟絲子枸杞子舶茴香牛膝青鹽楓橋五十三咽管似乎狹窄一身氣化全在於肺因胃熱薰肺肺職失司年紀日多氣結痹阻以薄味肅清上焦藥宜氣輕理燥鮮枇杷葉杜蘇子米仁桑葉降香末茯苓陳家橋三十六濁止足腫膝首腫痛病起夏秋必接地氣之濕濕自下受酒客內濕互蒸內外合邪湯藥決不取效蠲痛丹一錢六服閭門中焦痛起四末逆冷汗出嘔涎及食物此屬脾厥炒黑附子粗桂枝草果仁延胡索片薑黃太倉十八眷每交夏五六月喉間宿病俄發既愈後仍然鼻塞火升上熱下冷經水或前或後形瘦脈小數是陰弱不旺肝陽左升太速右降不及夏令陰伏於裡陽泄上浮乃發病根由阿膠石決明生地天冬肉丹皮黑豆皮銀花白芍藥丹參十四歲室女無溫熱藥之例視色奪脈弱下焦未寒先冷經事淋漓是衝任虛冷二氣不交冬宜藏陽用溫攝升陽麋茸人參沙蒺藜鹿角霜歸身杞子紫石英小茴香蛇床子同里廿夏令熱氣傷陰失血冬藏氣降血症必然不來肉瘦精虧嗽不肯已但宜滋培臟陰預防春深升泄不可以藥理嗽固本法加五味子人參熟地生地麥冬天冬五味子沭陽五十四住居臨海風瘴癘氣不似平原人眾稠密處瘴癘侵入腦髓骨骱氣血不和漸次壅遏上蒸頭面清陽痹阻經年累月邪正混處其間草木不能驅逐憑理而論當以蟲蟻向陽分疏通逐邪蜣螂一兩仙靈脾五錢蜂房五錢川芎一錢火酒飛面泛丸同里四十五心痛得食而緩是積勞營虛大忌辛通破氣桃仁歸身柏子仁桂圓肉炒黑芝麻廿三病人遇春季失血煩勞必有衄血凡冬月大氣藏伏壯年自能聚精匯神不加保養春半陽生升發反為發病根機是皆身中精氣之薄胃旺安納自節欲靜養則神乃藏熟地萸肉山藥芡實湘蓮茯苓金櫻子五味子青龍骨湖州三十八太陰腹脹是久勞陽不飢不能食二便不通暢溫以通陽苦溫疏滯熟附子熟大黃草果仁生厚朴生薑廣陳皮山塘七十五立冬未冷溫熱之氣外入引動宿飲始而狀如傷風稀痰數日繼則痰濃咽乾是少陰脈中乏津上承五液盡化痰涎皆因下虛易受冷熱是以飲邪上泛老年咳嗽大要宜調脾腎最忌發散泄肺理嗽暫用越婢法麻黃石膏甘草芍藥生薑大棗槐樹巷廿三自乳能令陰傷秋初巔脹失血是肝火上衝使然今妊身三月法當養陰固胎人參子芩阿膠桑寄生白芍黑殼建蓮常熟三十二眷寡居無歡悅之念肝膽中氣火鬱勃直上直下莫能制伏失其疏泄之用小溲成淋謂肝脈環繞陰竅用龍膽瀉肝法龍膽草黃芩梔子當歸生地柴胡澤瀉木通甘草車前子常熟廿七眷瘧母瘕聚有形治有宣通氣血第所述病狀已是產虛八脈交損不敢攻瘕當歸生薑羊肉湯徽州三十九仲景論痰飲分二要外飲治脾內飲治腎又云凡飲邪必以溫藥和之閱方從腎臟主治不為背謬陽氣微弱濁陰固聚自下上逆喘不著枕附子走而通陽深為合理第其餘一派滋陰束縛附子之剽疾真武湯四十九積勞傷陽腹膨仍軟脈弦無胃氣形肉衰削理中宮陽氣之轉旋望其進食無能卻病矣人參淡附子穀芽茯苓益智仁廣皮炙草北城下三十六溫疹是一股乖戾不正無形之氣從口鼻吸受上竅阻塞嗆物不得下咽醫不辨有形無形但曰清火寒降至藥直入腸胃與咽中不相干涉連翹心馬勃牛蒡子銀花鮮蘆根武進四十六陽傷胃反熟附子淡乾薑桂枝黃連厚朴茯苓宿遷四十七冬月涉水水寒深入筋骨積數年而脛膝骨冷筋縱病在下為陰水寒亦是陰邪久則氣血與邪混亂草木不能驅逐古人取蟲蟻佐芳香直攻筋骨用許學士法炒烏頭全蠍麝香飛面火酒泛丸同里五十六酒熱深入血分瘀嘔盈盆越六七年病變反胃妨食嘔吐涎沫問大便仍通結閉止在中脘先通瘀開閉韭白汁金墨汁生桃仁生蒲黃延胡索片薑黃吳江十六天癸尚未至肉瘦形悴嗆嗽著枕更劇暮夜內外皆熱天明微汗熱減痰出或稠或稀咽中總不爽利此先天稟賦之薄稍長真陰不旺陰虛則生內熱怡悅勿事針黹必俟經來可得熱除不然即世俗所稱乾血勞怯復脈法去麻仁無錫三十九任脈為病男子內結七疝女子帶下瘕聚問經水仍至知是氣攻入絡漸次有形況產後又十六年不育衝任之病顯然小茴川楝子橘核甜桂枝蓬莪朮生附子南山楂雲茯苓南京三十二通中焦氣血痛緩嘔食是胃氣虛逆旋覆代赭湯南京三十五頻年發失血症嗽甚痰出繼以嘔噯日晡寒熱夜深汗泄據述醫見血投以鬱金薑黃韭汁製大黃逐瘀下走希圖血止此是有餘治法夫人稟陰陽偏則致病自內損傷即是不足脈左動數尺不附骨明明腎精肝血內奪弱陰無能交戀其陽衝陽上逆吸氣不入是以咳嗽氣並旋必嘔噯濁涎黏沫內經謂五臟六腑皆令人咳奈何今人以咳治肺見痰降濁清熱損者更損殆不復臟陰腑陽消長之機雜藥徒伐胃氣經年累月已非暴病填實下隙須藉有情之屬人參紫衣胡桃紫石英茯神五味子山萸肉河車膠秋石官宰弄三十一酒客多濕腸胃中如淖泥陽氣陷血下注昔王損庵以剛藥劫胃水濕理中湯加木瓜無錫三十一夏月帶病經營暑濕乘虛內伏寒露霜降天涼收肅暴冷引動宿邪寒熱數發形軟食減汗出醫工治嗽恐其胃倒漸致勞怯變凶歸耆建中湯雙林巷廿六早食嘔吐酸水濁涎心口痛引腰胯此陽微濁陰犯絡例以辛熱川烏頭高良薑延胡索川楝子白豆蔻茯苓杭州廿一據述遺精頻致哮喘病發必甚此腎虛失納真氣散越之疾少年形瘦難用溫藥治當導入任脈陰海以固之人參龜腹甲坎氣五味子紫衣胡桃黃柏芡實金櫻子膏雙林廿七痛而喜按屬虛痰多肢冷是脾厥病大便三四日一通乃津液約束炒熟桃仁火麻仁片薑黃當歸鬚炒延胡索無錫三十九眷秋七月經停幾兩月繼下血塊疑是小產遂經漏不止入冬血淨加五心脊椎骨熱天明微汗熱緩凡經漏胎走下元真陰先損任脈陰海少液督脈陽海氣升所謂陰虛生熱矣以肝腎臟陰精血損傷醫投耆朮呆守中上是不究陰陽氣血不亦左乎人參阿膠建蓮肉茯神女貞子萸肉生白芍炙草糯稻根包衙前四十五自胃痛起咽食又噎近加湧泛黏涎中年經營勞瘁陽傷清氣不司轉旋上不知飢大便不爽九竅不和都屬胃病人參熟半夏胡蘆巴蓽撥茯苓老薑汁陸家濱三十陰邪盛為腫便溏溺短議通腑陽生炒黑附子炒黑遠志生於術生厚朴椒目茯苓豬苓青皮南京三十七外邪窒閉肺竅用輕劑治上食可下咽水入必嗆者此喉氣有阻也仍以辛潤杏仁紫苑桑葉茯苓米仁通草錢塘五十四閱原案開列皆肺腎病男子中年以後下元精血先虧有形既去自難充復五液耗奪內風陽氣易越治宜從陰引陽勿以桂附之剛愎鹿茸鹿角霜天冬天麻茯苓淡蓯蓉枸杞子黃菊花常山四十三食入脘悶噯氣嘔吐覺爽少焉仍然痞悶視形軀充偉按脈形小濡中年陽微不運即為不足泄降氣分攻痰是為有餘治法非脈症所宜治中法淮安三十二武略用力迸氣與酒色精傷不同失血在長夏熱泄之令胸脅跗骨皆痛是肝胃絡傷桃仁米仁降香末茯苓蘇子韭汁炒山楂丹皮
