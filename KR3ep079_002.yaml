body:
  text: 卷二汪天植脈數如浮重按無力發熱自利神識煩倦咳嗆痰聲如嘶渴喜熱飲此非足三陽實熱之症乃體屬陰虛冬月失藏久伏寒邪已經蘊遏化熱春令陽升伏邪隨氣發泄而病未及一旬即現虛靡不振之象因津液先暗耗於未病時也今宗春溫下利治淡黃芩杏仁枳殼白芍鬱金汁橘紅女科有胎氣以立基為要惡阻嘔吐酸味宜安胃調氣産後下虛血病為多今脘中痞脹減食不適全是氣分之病但調氣寬中勿動下焦為穩生香附汁蘇木神麯豆蔻桔梗茯苓春溫症附暑濕熱朱先生勞倦嗔怒是七情內傷而溫邪感觸氣從口鼻直自膜原中道蓋傷寒陽症邪自太陽次第傳及至於春溫夏熱則鼻受氣肺受病口入之氣竟由脘中所以原有手經見症不比傷寒足六經之病也其原不同治法亦異仲景論溫邪不可發汗汗則劫津傷陽身必灼熱一逆尚引日再逆促命期又云鼻息鼾語言難出劇則驚癇瘛瘲無非重劫津液所致今病發熱原不是太陽客邪見症所投羌防辛溫表汗此誤即為逆矣上竅不納下竅不便亦屬常事必以攻下希圖泄熱殊不知強汗劫津而傷陽妄下劫液更亡陰頃診脈兩手如搐而戰舌乾燥而無苔前板齒乾目欲瞑口欲開周身燈照而淡晦斑紋隱隱約約幾日來時有厄逆因胃乏穀氣而中空肝陽衝突上冒肆虐耳為今返正先與糜粥使胃中得濡厥陽不致上冒而神昏之纍可已進藥之理甘溫可以生津除熱即斑疹亦不足慮觀仲景論中邪少虛多陰液陽津並涸者復脈湯主之謹仿此義炙甘草人參生地白芍阿膠麥冬溫邪有升無降經腑氣機交逆營衛失其常度為寒熱津液日耗渴飲不飢陽氣獨行則頭痛面赤是皆冬春驟暖天地失藏人身應之患此者最多考古人治溫病忌表散誤投即謂劫津逆傳心包最怕神昏譫語妄狂治病以辛甘涼潤為主蓋傷寒入足經溫邪入手經也上潤則肺降不致膹郁胃熱下移知飢渴解矣嫩竹葉桑葉杏仁蔗汁麥冬生甘草石膏冰糖淨炒起自熱病熱傷陰絡血大瀉自當宗血脫益氣之旨今脈左大急疾右小微弱臍旁動氣肌膚枯燥陰分大耗正當暑月何以堪此擬進九龍法通補兼施若得動氣稍減病可平和矣熟地炭山楂糖油炒琥珀屑新絳衝入藕汁素有濁陰上干之症近因濕氣淫蒸新舊合而為一壯熱吐苦水噦上逆舌色微白脈小弦木氣欲升而復為濕遏之象也當用苦辛以劫濕邪為主即仲景先治新後治痼之意也川連泡薑炒厚朴半夏塊苓即進一劑噦少緩可用黃連溫膽湯一二盞邪熱盤踞陽明體虛不耐重劑宜輕用苦辛通泄為主連翹杏仁生香附橘紅滑石鮮荷葉通草銀花又方米仁連翹銀花橘紅通草青荷梗中氣素虛形寒飲冷遏伏暑濕之火蘊於膻中劫津耗液盡從燥化肺氣不能下輸腸胃燥滿不行下之遂逼血下行血既下奪亦云竭矣陰不配陽汗從外泄即為上厥上厥下竭肺經獨受燥纍急進清燥救肺湯以回陰液枇杷葉人參麥冬桑葉阿膠杏仁生石膏竹葉繼進方羚羊角棗仁茯神山梔皮黑豆皮枇杷葉麥冬蔗汁鮮菖蒲再進方小生地人參阿膠茯苓黑豆皮枇杷葉青蒿麻仁麥冬脈來和靜舌苔已退但時或煩熱胸中未適此皆燥邪未盡之徵是以神識尚未全復究竟必以滋燥為先阿膠枇杷葉麥冬川斛山梔北沙參茯神菖蒲邪脈悉退微遲和緩用平調營衛胃氣自復復脈湯主之人參麥冬炙草阿膠茯神白芍麻仁五味炒生地舌白肢厥語錯丹疹背多胸少汗大出此濕邪著於氣分邪鬱氣痹故現外寒非虛脫也生地阿膠滋清涼血則氣濕愈阻此屬邪郁不但分三焦更須明在氣在血羚羊角天竺黃射干川貝米仁茯苓石菖蒲目赤唇焦齒燥舌黑嬉笑錯語發噦發斑溫毒遏伏之象緑豆殼銀花露方諸水犀角川貝母人中黃蘆根汁徐徐溫服又方金汁拌浸人參銀花露鮮菖蒲元參鮮生地羚羊角真金箔五十七歲豐腴體質適值過勞陽氣受傷嘔吐食物無頭痛身熱已非外感風寒而間日煩躁渴飲唇焦舌黑是內伏熱氣由募原以流布三焦亦如瘧邪分爭營衛者然然有年積勞既久伏邪客病本輕脈小緩按之不為鼓擊可為徵驗且二便頗通略能納穀焉有停滯積聚仲景於疸熱無寒之條不出藥方但曰以飲食消息後賢參聖意甘寒以養胃陰其熱自解要知表散之辛溫消滯之苦溫以及苦寒沉降多犯聖訓戒律矣鮮生地甜杏仁麥冬花粉竹葉心青蔗汁連翹舌心黃邊白渴飲水漿停胃脘欲吐微微冷厄自利稀水小便不利診脈堅徑不和八旬又二暑熱濕邪內著必脾胃氣蘇始可磨耐以尊年不敢過用清消矣議用清暑益氣方人參茯苓廣皮豬苓石蓮子川連黃芩厚朴澤瀉煨葛根脈弦嘔吐心中懊憹不納水穀倏冷忽熱雖因嗔怒七情兼有客邪伏氣汗多不宜表散清暑和中為正治杏仁半夏鬱金茯苓廣皮枳實金斛診脈左虛大右澀小弱症見目瞑短氣遺尿肢掉神識漸迷渴不欲飲侵早稍安晡時煩躁此乃積勞元傷熱氣內迫劫爍臟液致內風欲擾有痙厥之慮仲景謂元氣受傷致病當與甘藥就暑熱傷氣亦屬發泄所致東垣發明內傷暑病益氣諸法足為炳據若動攻表裡是速其散越耳麥冬生甘草鮮蓮子知母竹葉心不飢不欲納食仍能步趨長夏濕蒸著於氣分陽逆則頭中脹悶肌色萎黃與宣氣方法西瓜翠衣飛滑石米仁蘆根通草鬱金脈轉數舌紅面腫消膚痛汗減耳鳴咽嗆肛痔濕中化熱乘竅仍清氣邪佐通營衛桂枝白虎湯主之酒家濕勝於內暑邪穢氣亦由口鼻而入內外相因延蔓三焦汗多寒熱不解非風寒從表而散頭脹脘悶嘔惡而渴不多飲兩足反冷是熱在濕中而來古稱濕上甚為熱不與傷寒同論杏仁半夏茵陳白蔻厚朴廣皮茯苓皮六一散鮮菖蒲三益號勞倦吸入冷氣營衛不行則形寒戰栗今中焦未醒宜和脾胃當歸白芍桂枝炙草大棗煨薑章暴冷外加熱氣內郁肺窒不降脘悶如飢水飲欲嘔頭痛寒熱當治上焦桔梗象貝橘紅兜鈴北沙參杏仁熱緩神昏咳痰嘔逆舌不能言餘邪漸入心包絡恐著瘛瘲進芳香入絡法萬氏牛黃丸穢濁不正之氣擾中痞悶噁心頭疼煩渴形寒內熱邪不在表未可發散杏仁蔞皮滑石通草白蔻鬱金花粉連翹脈細數舌絳煩渴時熱病九日邪氣稍衰正氣已虧不宜再作有餘治鮮生地阿膠元參麥冬知母麻仁時疫發熱脘悶噁心斑發不爽神煩無寐舌色轉紅邪熱將入營分雖胃滯未清亦宜先清營熱勿得滋膩為穩鮮竹心元參連翹心鮮菖蒲銀花川貝陰液損傷陽氣上冒衄血咳痰理宜和陽存陰冀津液稍復望其轉機至於疏滯解表和表諸法自然另有高見非敢參末議也秋石拌人參阿膠鮮生地麥冬脈軟咳痰欲嘔飢時甚雖是時邪未清高年正虛理宜養胃陰金匱麥冬湯麥冬人參半夏甘草粳米大棗胃津既傷肝風上擾神迷肢震面浮欲喘病勢危險勉擬救胃陰方人參麥冬生甘草白粳米炒半夏南棗時疫六日不解頭疼發熱舌絳煩渴少腹痛劇已經心包慮其厥痙犀角連翹心銀花元參通草鮮生地又方犀角鮮生地元參麥冬川貝先厥後熱邪氣蘊伏亦久從傳染而得今脈數舌紅頭疼乾嘔脘悶多痰皆是熱蒸營衛慮其再厥羚角犀角連翹心川貝元參銀花通草鬱金又方犀角連翹心川貝元參銀花通草鬱金又方犀角連翹心川貝通草銀花石菖蒲金汁又前方去通草加麥冬又方捲心竹葉知母生甘草麥冬花粉川貝又方鮮佩蘭汁麥冬南花粉棗仁米仁川貝溫熱後肝陽乘胃涎沫自出胸滿如悶咽中間或氣促潮熱時作四肢微冷慮其厥逆進熄風和陽法淮小麥炒半夏甜杏仁炒麥冬南棗又方人參麥冬淮小麥茯苓南棗炙甘草時熱食復胸痞噁心欲嘔進半夏瀉心法炒半夏川連枳實杏仁薑汁厚朴草蔻又方人參山楂枳實乾薑薑汁炒半夏脈緩舌色灰黃頭疼周身掣痛發熱不止乃時疫濕溫之症最忌辛溫重藥擬進滲濕之法竹心連翹心厚朴木通杏仁飛滑石茵陳豬苓脈左數右緩舌白髮熱自汗小溲溺痛身半以上皮膚骨節掣痛皆是濕邪有痹慮其清竅矇蔽有神昏厥逆變幻擬用輕清滲濕方連翹豆卷米仁絲瓜葉花粉茵陳通草杏仁飛滑石脈細舌灰白渴不能多飲膨悶不知飢濕溫半月有餘病邪雖解余濕未盡良由中宮陽氣鬱遏失宣暢機關故舌喜得香味理宜護持胃陽佐以宣濁驅濕未可再作有餘攻伐雖取快一時貽禍非輕小也半夏人參厚朴橘紅枳實茯苓脈促神倦目上視咳痰欲喘唇燥舌紅溫邪發熱半月外不解所擬發散消導之藥病不少減正氣反傷內風乘虛上擾慮有痙厥變幻非輕小之恙姑與甘緩法炒麥冬北沙參淮小麥生甘草南棗肉脈虛細無力熱止後汗多心悸頭暈寐多驚恐舌紅營陰受傷理宜和陽存陰生地麥冬淮小麥阿膠人參炒麻仁陳診脈左帶微數右關微弦胸脘痞悶右眼角赤皆是肝木乘坤土經旨有腎藏志脾藏意今夢寐驚惕是見不藏之象倘調養失宜內有七情之擾外有六淫之侮再經反復藥餌無過樹根草皮焉能有濟故重言以申其説人參半夏枳實茯苓乾薑小川連第二案六脈略和舌胎已退胸脘稍寬渴飲至胃微覺呆滯大便乾燥勢見陰枯陽結通陽之中佐以潤燥亦屬至理至於調養靜攝工夫不必再贅柏子仁蓯蓉歸鬚炒桃仁塊苓桂心第三案立夏日診脈氣和病情減清晨微覺氣悶陽氣尚未全振再論人身中陰陽二氣每相眷顧陽病久必傷陰陰病久必傷陽故病久之體調養失慎必至反復諄諄至囑進苓桂朮甘湯以宣上鬲之陽第四案年過五旬腎氣本弱病纏日久脾土亦餒腎惡燥脾惡濕經旨昭昭若欲平穩宜乎分治為妥是將來調補丸藥章旨今上鬲已寬且進下焦調補為法蓯蓉歸身杞子茯神小茴柏子仁天冬巴戟牛膝第五案病減六七惟納食不易運化飲湯不易下趨口中味淡時或作酸大便燥艱乃脾陽不振腎陰未復故潤劑之中佐以辛香有合經旨辛甘化風之意柏仁小茴蓯蓉車前茯苓牛膝歸身桂心第六案脈神俱安大便艱澀不爽臍間隱隱作痛高年腎陰暗虧血液不能灌溉四旁腸中枯燥更衣頗覺費力擬進通幽湯方法以潤之歸鬚紅花郁李仁柏仁麻仁生地升麻第七案兩日連次更衣臍間疼痛已止胸鬲之間略覺不和則知病纏日久不獨血液受虧氣分亦為之不振擬溫填藥餌佐以通陽庶幾中下兩顧蓯蓉茯苓杞子小茴柏仁牛膝人參巴戟範升九四肢乍冷自利未已目黃稍退而神倦不語濕邪內伏足太陰之氣不運經言脾竅在舌邪滯竅必少靈以致語言欲謇法當分利佐辛香以默運坤陽是太陰里症之法生於術草果仁厚朴木瓜茯苓澤瀉第二案身體稍稍轉動語謇神呆猶氣機未為靈轉色脈非是有餘而濕為陰邪不徒偏寒熱已也生於術石菖蒲汁鬱金茯苓遠志米仁第三案濕滯於中氣蒸於上失降不得寐口起白疳仍不渴飲開上郁佐中運利腸間亦是宣通三焦也生於術寒水石米仁桔梗廣皮豬苓澤瀉第四案濕勝中宮不運易生痰飲不欲食須使神機靈泛少佐疏滯外臺茯苓飲去廣皮加天竺黃石菖蒲第五案人參金斛枳實於朮茯苓廣皮第六案脾胃不醒皆從前濕蒸之纍氣升痰咳參藥緩進炒川貝茯苓地骨皮米仁鬱金淡芩吳子純連朝驟熱必有暑氣內侵頭熱目瞑吸短神迷此正虛邪痹清補兩難先與益元散三四錢用嫩竹葉心二錢煎湯涼用二三小杯常用緑豆清湯服第二案溫邪中傷之後脾胃不醒不飢口渴議清養胃津為穩鮮佩蘭葉川斛知母大麥仁炒麥冬王廷佑寒包鬱熱亦屬溫邪桔梗大力連翹蘇子滑石枳殼赤芍木通寒熱漸除間一日復來即暑邪入里之徵因正氣不振故也但煩渴不減舌苔黃厚胃中滯濁猶然不清河間方法正直此症非是抄竊舊方乃去邪務盡之意暑風入肺咳痰發熱四肢無力微冷氣喘神倦恐邪犯心包有慢脾驚搐之慮擬進局方至寶丹芳香逐暑使喘緩神安再商進和脾胃藥又案有汗出熱緩神識昏憒邪熱內閉未得外越易變痙厥進芳香開閉以逐穢邪牛黃丸又方生地甘草知母淡竹葉滑石銀花又方人參生草知母南棗肉麥冬茯神廣皮徐方鶴脈緩舌白帶灰黑色心中煩熱汗多渴飲嘈雜如飢肛中氣墜如欲大便平昔苦於脫肛病雖夾濕熱寒涼清濕熱之藥味難投擬進和中法炒麥冬粳米川斛半夏南棗徐左脈數舌白目黃遍身發黃左腰脅間痹痛臥則氣逆或噯氣或咳嗆則痛不可忍濕熱著於絡中氣機阻遏不宣況時邪一九日正邪勢方張之候故攻病藥餌往往難投輕藥為穩豆卷白蔻通草茵陳米仁杏仁豬苓澤瀉雨濕地蒸潮穢經旬人在氣交之中口鼻吸受從上內侵頭脹脘悶肉刺骨痛蓋肺位最高其氣主周身貫穿既被濕阻氣不運通濕甚生熱汗出熱緩少間再熱凡風寒得汗解濕邪不從汗解耳仲景云濕家不可發汗汗之則痙謂濕本陰晦之邪其傷必先及陽故汗下清熱消導與濕邪不相干涉也濕也熱也皆氣也能矇蔽周身之氣原無有形質可攻由上不為清理漫延中下二焦非比傷寒六經自表傳裡相同河間暢發此義專以三焦宣通為法明張司農亦以苦辛寒主治總以氣分流利為主氣通則濕解矣今兩旬不愈入暮昏厥厥者逆亂之稱以邪深入至陰之中熱蒸上冒致神明為邪所矇蔽矣初濕邪下注而大便為溏今則氣窒結閉而大便不通古稱熱深厥深又云厥少熱多則病退厥多熱少則病進凡厥多隸厥陰也掘地坎三五尺全無瓦礫方是真土入新汲井水用木棍淘二三百下取泥漿水澄清二盞另以緑豆皮野赤豆皮馬料豆皮各五錢入地漿水中煎湯一茶杯許候溫入生珍珠細粉約七八分冰片半釐勻三次服再論暑濕客氣由上受以行中道未按經法致三焦否塞逆亂為厥厥屬邪深在陰故取地漿重陰之氣珠潛水底鹹寒少佐冰片辛熱能開熱痹直走至陰以冀厥止究竟暑濕熱氣乃無質之邪瀰漫胸臆如煙霧繚繞諸宗氣營氣無以展舒焉有知味知飢彼攻消峻克能滌有質之邪滯非濕結氣分之治也昔軒岐云從上病者治其上且上焦如霧藉輕揚可以去實半月不更衣斷勿攻下皆氣窒使然川貝米仁兜鈴白蔻連翹射干通草舌紅微渴齒痛味甘中宮不運氣鬱之熱未得全去也連翹米仁茯苓皮赤豆皮川貝白蔻潘育翁中年沖氣痰升喘急隨發隨止從肝腎本病治固是地黃飲子用意在濁藥輕投勿以味厚凝滯痰氣但以質能引導至下變飲為丸純是濁藥柔溫若歸脾湯甘溫守中養脾之營更與痰飲沖逆相背自七月間反復必有暑濕客氣從呼吸而受據述肌膚間發丹疹浮腫甚速腠膜映紅若但內症未必有此思夏秋口鼻受氣上焦先傷與肝腎本病兩途上焦失解理必延漫中下而三焦皆為病藪矣此脹在乎脈絡不在腑腸水穀無礙者緣此況久病大虛溫補不受必當推其至理伏邪引動宿病仲景論必先理其邪且口渴便實豈溫熱相宜自言懷抱鬱結相火內寄肝膽如莖腫囊縱濕壅水漬勉以三焦氣分宣通方仿古二虛一實偏治其實開其一面也飛滑石杏仁茯苓皮厚朴豬苓通草白蔻仁積勞伏熱值初冬溫暖天地氣不收降伏邪因之而發是為冬溫實非暴感表散無謂其痰喘氣促左脅刺痛系身中左升不已右降失職高年五液已衰炎上之威莫制脈現左細右搏尤屬陰氣先傷煩勞兼以嗔怒亦主七情動陽從來內傷兼症不與外感同法苦辛劫爍胃津陰液日就枯稿故仲景凡於老人虛體必以甘藥調之夫喘咳之來固是肺熱以診脈面色論之為下虛正氣不主攝納腎病何疑即初起熱利亦是陰不固擬用復脈湯炙甘草炙生地炒麥冬生白芍麻仁蔗漿溫邪兼勞倦從內傷治已獲小效獨左脅痛難轉側咳嗽氣觸必加閃痛想因平素操持肝陽易熾營陰暗耗內經以肝為將軍之官謀慮出焉故身中左升之氣屬肝主之右降之氣屬肺主之今面微赤而咳頻前此上焦畏熱煩躁其左升之令不已右降之氣失司已經洞悉經以左右為陰陽之道路升降周行一日夜行五十度平旦交會於氣口既為拂逆情志而裡氣郁遏冷熱外加營衛因之窒阻此陰陽道路流行或遲或速無平旦清明之氣是以發散消導清火利痰之品昧於身中轉旋有若天地也再論平昔精力頗健今已大年下焦先虛夫下虛者上必實眩暈神昏自利可見矣以冬令藏聚返根之候見症若是為忽然中厥亦屬常有此授藥之難自宜瞻前顧後議用錢氏地黃湯意栽培三陰臟陰疏其三陽腑陽俾臟主藏腑主通佐以咸降理逆穀味有加再為進商可也熟地白芍山藥澤瀉丹皮茯苓牡蠣阿膠暑邪成瘧熱結三焦脘痞有形煩渴喜冷飲從河間法主治暑熱未盡清竅不利自言神識如迷夜不成寐竹葉元參連翹心菖蒲鬱金川貝高年正氣已衰熱邪陷伏故間瘧延為三日此屬厥象舌涸脘痹噫氣欲嘔胃虛客逆恐有嘔吐厄忒之變議用旋覆代赭鎮其逆亂之氣合瀉心法以開熱邪壅結為主人參川連乾薑白芍旋覆花代赭石烏梅牡蠣半夏服一劑減去半夏乾薑服經云夏傷於暑秋為痎瘧今時已孟冬瘧始發動蓋以邪氣內藏於臟為厥少兩陰經瘧也擬以溫臟法厚朴製附子生牡蠣炙甘草大棗食菜下痢腹痛是初因寒濕傷脾久變濕熱蒸於腸胃況利後痛不減腹中硬起不和不得流通明甚當以苦泄小腸兼分利而治川連黃柏苦楝皮澤瀉木通楂肉口中乾燥小水全無泉源已竭陰液無以上承利症噤口都是濕熱壅於胃口下元衰憊衝脈氣震高突此攻病保真理難捉摸川連草決明石蓮黃芩烏梅白芍少腹痛下痢帶血黃芩炙草炒銀花炒丹皮痢止咳頻脈虛形寒多悸進甘緩法小建中去薑加玉竹陰絡受傷下午黃昏為甚非自治痢通套可效大旨以守陰為法熟地炭建蓮茯苓五味子赤石脂澤瀉阿膠稚年頻頻傷風咳嗽汗出痰多不嗜谷菜乃衛外不固肺易偏傷冷熱當春升氣泄忽然指握無力走動足疲語言或謇常有嘔惡蓋衛應乎胃胃屬陽明其脈主司束筋骨以流利九竅而四肢原屬脾胃舌為心苗脾竅通焉此皆久傷氣分乘氣泄而病乃虛症也治法以充脾胃脈絡疏竅諸藥皆當屏絶百日可期其效人參蜜炙耆歸身炙草廣皮白芍防風根煨薑棗子脈虛數喉乾舌燥欲咳乃陰虧於下燥爍於上非客病也生地熟地天冬麥冬扁豆咳嗽肉消老弱腎病食入腹脹大便稍利勢減兼之晝甚夜輕據是氣分陽府失宣徒執虛治不效經云二虛一實者偏治其實開一面文也據經以疏方米仁茯苓澤瀉杏仁寒水石脈細咳逆不得側眠肌消色奪經水已閉食減便溏久病損及三陰漸至胃氣欲敗藥餌難挽擬進建中法冀得胃旺納穀庶幾帶疾延年建中湯去薑王公美脈沉而咳不能著枕而臥此老年下元虛氣不攝納濁氣痰飲皆為陰象乘暮夜陰時寐發發散清潤皆非當以小青龍法開太陽經撤飲下趨小青龍去麻辛草徐十四歲幼沖多六氣之擾少七情之傷痛在下焦肢末初痛必系寒濕痹阻於經絡之中方書謂為寒為痛為濕為腫砭刺疏通引動脈中之氣血原得小效寒濕邪氣屬陰久蓄不得解散蒸腐血液變熱成膿附骨癰瘍久而精神日憊理必延為漏卮矣三年宿疴寒暑迭更邪必渙解此為損症凡女子二七而天癸至謂體陰用陽也昔因客氣而致病再因痛傷已損及真氣諸症所稱難狀痼疾矣今倐熱蒸蒸喉燥嗆咳納食日減乃損至精髓草木攻邪日加剝斫參苓養氣難充形質投藥必不見長無治病成法可遵蓋以有情之虛養非氣味之乘強望胃納扶持至春回寒谷再議丸方身體熱蒸多嗆火升用糯稻根鬚漂洗潔陰乾兩許煎湯服此能退陰分燔灼之熱種植以來不見天日得水土之養清而不克之藥人參非助熱之藥本草云陰中之陽其氣主升故不宜單用食少易熱咳嗆耆朮歸地皆為壅滯以人乳旋成粉和參末捏作錢許小丸俾濡養血中之氣藉人身之生氣胃氣略好當與景嶽一氣丹制膏與服中有紅鉛一味世間無有真者以真坎氣二十四枚代之合乎二十四氣以默運耳吳風溫上受飲邪上泛臥枕則咳甚飲陰類也先以輕揚肅上再議理飲桔梗兜鈴米仁茯苓通草象貝急火煎服一次又案輕可去實恰當上受風溫但左脅引動而咳甚經言左升太過右降不及然非肝木之有餘雨水春木萌動氣升上沖皆血液之少不主配偶之義甜杏仁玉竹甘草桃仁炒麻仁汪裕當喉癢嗆甚形寒忽熱今早便溏臥醒咽乾不為口渴議養胃陰以供肺扁豆北沙參南棗元米湯煎酒客伏濕脈數汗多咳嗽食不易運病在手足太陰茅朮扁豆米仁桑皮杏仁半夏茯苓老年冬季喘嗽是元海不主收攝衝陽升舉飲邪上泛阻遏流行喘嗽愈甚閲古都主八味腎氣溫養坎中之陽收納散失之真不主消痰清肺意謂非因六氣所致奈體質不受桂附年前議進柔陽通攝若以建立上中之陽乃心脾甘溫之劑與下焦不納無謂紫衣胡桃肉茯苓補骨脂另用胡銚肉拌蒸曬炒鹿茸切薄片鹽水浸一日烘燥肉蓯蓉五味子遠志肉青鹽柏子霜蜜丸脈細軟澀氣衝失血寐欲遺精今納穀不運神思日倦緣操持太過上下失交當治中焦心脾之營自旺諸症可冀漸復偏熱偏寒都是斫喪真元人參歸身於朮廣皮棗仁茯神白芍炙草當夏四月陽氣大升體中陰弱失守每有吐衄神煩已交夏至陰欲來復進甘藥緩補所謂下損不得犯胃也熟地蓮肉炙草山藥茯神芡實阿膠柏子仁稚年吐衄熱傷為多今脈小肌松食少胃虛陽升已露一斑進甘涼益胃方炒麥冬生扁豆北沙參茯神木瓜炙草秋暑失血初春再發脈右大頗能納食金匱云男子脈大為勞極虛亦為勞要知脈大為勞是煩勞傷氣脈虛為勞是情欲致損大旨病根驅盡安靜一年可愈炙綿耆北沙參炙草白芨苡仁南棗據述病原朝寒暮熱已止血逆已平稍見喘咳近日復有惡寒發熱此因內虛成瘧尚宜小心制首烏川貝茯苓白芍甘草丹皮柴胡廣皮右寸浮數餘脈虛澀失血寒熱已止但喉中作癢咳嗽大便又不堅固此脾肺俱虧正在潤肺礙脾補脾礙肺之時清心靜氣病可漸卻至囑川貝丹皮玉竹生地茯苓甘草牛膝橘紅北沙參李云生咳甚嘔血吐食肝病犯胃陽氣升逆所致代赭石新絳茯苓丹皮旋覆黑山梔血症發後體虛氣弱暑氣外侵而寒熱腰痛飢不欲食雖咳嗽未減當治其本即急則治標之義也香薷扁豆木瓜厚朴痰飲咳嗽終夕不寐面浮如盤昔徽宗寵妃病此治用真蚌粉新瓦上炒紅入青黛少許用淡齏水滴麻油數滴調服二錢肝主筋腎主骨陰器者宗筋之所聚男子天癸未至強通其精異時必有難名之病今患腰膝痠疼宗筋短縮大便結澀小便淋瀝足腿消爍筋肉拘攣無非肝虧腎損所致按脈沉細而兼微數乃精不營筋又有伏火內經所謂發為筋痿及為白淫者是也治宜滋腎舒肝使精血漸充則筋骨亦漸和柔但幻症日久非一朝一夕之功幸弗期速效熟地歸身牛膝肉桂黃柏線魚膠續斷鉤鉤水煎空心服交四之氣熱勝元虛乃氣泄之候營衛本乎脾胃不耐夜坐舌心腐碎吸吸短氣似不接續中焦喜按始得暢達目胞欲垂難舒四肢微冷失和從前調理見長每以溫養足三陰臟兼進血氣充形病減七八今當長夏脾胃主氣氣泄中虛最防客氣之侵是質重之補宜緩而養胃生津寧神斂液仍不可少俟秋深天氣下降仍用前法為穩擬逐日調理方法人參茯神天冬棗仁知母建蓮肉炙草川石斛熬膏早上進丸藥一次遇天氣鬱悖泛潮常以鮮佩蘭葉泡湯一二次取芳香不燥不為穢濁所犯可免夏秋時令之病鮮蓮子湯亦好若汗出口渴夜坐火升舌碎必用酸甘化陰以制浮陽上亢宜著飯蒸熟烏梅肉冰糖略煎一沸微溫和服一次飯後飲茶只宜炒大麥湯岕片或香梗茶其松蘿六安味苦氣降中氣虛者不宜用瓜果宜少桃李宜忌玉蜀黍堅澀難化中虛禁用香薷飲泄越滲利頗不相宜或有人參者可以涼服暫用煎藥當和中清暑以雨濕已久中焦易困耳人參木瓜扁豆麥冬茯苓甘草佩蘭葉臨晚進膏滋藥人參熟地遠志甘草綿耆茯苓桂圓肉歸身五味枸杞照常法熬膏不用蜜收白水調服當夏季反復變幻因天地氣機大泄身氣久虛無以主持故見病治病無功而安中納下每每獲效入秋常進附子七味丸頗合今秋分節天氣降地氣收緣久熱氣傷虛體未能收肅是以肢節時寒頭巔欲冷無非病久諸氣交餒斯外衛之陽少護液髓暗耗則血脈不營而陰乏內守凡此皆生氣之淺鮮也急當溫養益氣填補充形使秋冬助其收藏預為來春生髮之用內經有四季調神之訓今投藥亦當宗此旨鹿胎一具羊內腎生十對黃狗腎二十副肉蓯蓉一兩五錢大熟地四兩砂仁制茯神一兩五錢五味一兩五錢湖蓮肉二兩人乳粉一兩五錢柏子霜一兩五錢紫河車一具漂青鹽八錢上用諸膏並搗地黃為丸早服五錢人參湯送有年勞傷神瘁膚無膏澤時欲腹鳴啾痛營血不得流行之故開懷安逸僅可帶病延年人參當歸肉桂白芍炙草茯苓遠志熟地炭産後腫脹不愈顯然下焦先虛肝腎氣散不主收納形寒痞悶食少痰多形消肉削治從溫納分利攻消法濟生腎氣丸三錢磨沉香汁三分衝開水送身熱解墮惡風汗出如雨喘渴不任勞事內經謂漏風症此飲酒汗出當風邪留腠理也白朮澤瀉麋銜草新會皮音啞者陽邪搏於三陰少陰之脈循喉嚨太陰之脈連舌本厥陰之脈出咽喉故也然陽邪搏陰之候正未易治甘草桔梗蔞皮麥冬川連杏仁丹皮生蒲黃生地上燥治氣下燥治血此為定論今陽明胃汁之虛因久痛嘔逆投以香燥破氣津液劫傷胃氣不主下行腸中傳送開合皆失其職司經云六腑以通為補豈徒理燥而已仍議清補胃陰為法鮮生地甜梨肉天冬肉人參生白蜜未交四九天癸先絶今年五十有二初冬脊骨痛連腰胯膝跗無力動則氣喘立則傴僂耳鳴頭暈上熱下冷呼吸必經脈閃痛時有寒熱穀食日減少味溺短便艱枯澀此奇經脈病漸成痿痹廢棄之疴夫督脈行於身後帶脈橫束於腰維蹻主一身之綱維今氣血索然八脈失養經謂陽維為病苦寒熱而諸脈隸肝腎陽明之間故所患不專一所交冬大地氣藏天氣主降為失藏失固反現泄越之象治病當法古人如雲痛則不通痛無補法此論邪壅氣血之謂今以絡脈失養是用補方中宣通八脈為正冬至小寒陽當生復病勢反加調之得宜天暖溫煦可冀痛止然陽藥若桂附剛猛風藥若靈仙狗脊之走竄總皆劫奪耗散用柔陽辛潤通補方妥鹿茸鹿角膠淡蓯蓉當歸枸杞生杜仲牛膝蒺藜炒鹿角霜腸澼下白沫者肺氣下移經言氣並於陰猶雲陽下陷也又云脈沉則生浮則危者恐虛陽欲撒之象而真氣欲離耳人參炮薑桂枝木黑於朮炮附子大棗炙甘草勉強搖精致陽縮囊縱不但形弱傴僂肛門臍竅皆為收引咽喉牽絆自此食物漸漸減少由精血之傷有形最難自復少厥兩陰脈循喉嚨開竅於二陰既遭損傷其氣不及充注於八脈見症皆拘束之狀上年進柔劑陽藥服後頭巔經脈皆脹耳竅愈鳴想是藏陰宜靜試以乘輿身怖必加局促不安宜乎升陽之動藥不靈矣夫少陰內藏原有溫蒸諸法厥陰相火內寄惡寒喜涼仿丹溪潛陽法仍候高明定義元武版知母茯苓秋石生地阿膠遠志炭柏子仁又交四之氣熱勝元虛則氣候不耐久坐舌心腐碎吸短氣似不接續中焦喜按始得暢安目胞欲垂難舒四肢微冷失和從前調理見長每以溫養足三陰兼進血氣充形之品病減今當長夏脾胃主氣氣泄中虛最防客氣之侵是質重之補宜緩而養胃生津寧神斂液仍不可少俟秋深天氣下降仍用前法為穩擬逐日調理方法人參麥冬知母天冬茯神甘草川斛建蓮遇天氣鬱悖泛潮常以枇杷葉拭去毛淨鍋炒香泡湯飲之四次取芳香不燥不為穢濁所侵可免夏秋時令之病若汗出口渴夜坐火升舌碎必用酸甘化陰以制浮陽上亢蒸熟烏梅肉一錢冰糖三錢煎湯飲瓜果桃李御麥中虛禁食香薷飲泄越滲泄頗不相宜暫用煎藥當和中清暑雨濕已久中焦易困人參茯苓麥冬木瓜甘草炒香枇杷葉臨晚服膏方人參麥冬熟地遠志炭五味子茯苓枸杞又常夏季反復變幻因天地氣機大泄體氣久虛無以主持故見病治病則無功而安中納下每每獲效人秋常服附子七味丸頗安秋分節天氣降地氣收緣火熱氣傷虛體未能收肅是以肢節時寒頭巔欲冷無非病久諸氣皆餒斯外衛之陽少護液髓暗枯則血脈不營而陰乏內守凡此皆生氣之漸鮮也急當溫養益氣填補充形使秋令助其收藏預為來春生髮之用按內經有四氣調神法即今投藥亦當宗此旨鹿胎熟地五味子麥冬人乳粉蓯蓉黃狗腎柏子仁青鹽參湯下濁膩膏淋日下最易損人津液絡脈遂稿況八脈隧道紆遠泛然補劑藥力罔效難經謂十二經屬通渠旋轉循環無端惟奇經如溝渠滿溢流入深河不與十二經並行者也樹根草皮此症亦難奏效須用血肉填補固澀庶可希其獲效麋茸河車人參蒸黑於朮茯苓湘蓮縮砂雀卵䕡茹烏賊骨雀卵河車膏為丸瘧病內經謂小邪之中雖云十二經之瘧總不離乎少陽少陽肝臟相附瘧久盤踞未免凝痰積血即成病根矣虛者補正為先補正不應法當破血柴胡草果炒桃仁青蒿半夏歸尾桂枝炒黑蜀漆瓜果水寒暴涼迅風內外兩因舌白渴不能飲脘中脹滿煩不肯寐身無熱頭不疼微嘔此足太陰中寒已經冷汗肢厥脈弱濡伏醫猶以疲敝方藥正如隔靴搔癢矣生草果生於術藿梗淡乾薑厚朴丁香柄長夏外受暑濕與水穀之氣相併氣阻蒸迫上焦不行下脘不通不嗜飲食目黃舌白邪結氣分杏仁厚朴茯苓蔻仁炒半夏薑汁脈緩身痛汗出熱解復熱此水穀之氣與濕並阻於氣分鬱而成熱治宜利濕宣通氣分濕去熱自解矣徒進清熱不應飛滑石腹皮茯苓皮白蔻仁豬苓通草淡黃芩舌白渴不欲飲嘔有痰口味皆變頭中空痛兩頰赤此水穀濕熱氣並鬱蒸腸胃致清濁變混忽然煩躁難鳴苦況法當苦寒泄熱辛香流氣滲泄利濕無形之濕熱去有形之積滯自通淡黃芩野鬱金川連秦皮白蔻通草豬苓厚朴脈右虛左弦身麻肢冷胎中脹悶不飢吞酸由中虛肝氣內動之因五六月當脾胃司胎又體質不受苦寒非清火酸泄氣分之法所宜人參炒半夏枳殼桔梗薑汁陽明脈衰厥陰風動經絡交虧麻木痛痹肢節重著久而成痿當以護陽之劑黃耆杞子制川附續斷防風白芍遠志首烏稚年秋月時病愈後食蟹自必辛酸內茹遂致傷營吐血先理清營解毒蘇子麥冬生蒲黃細生地丹皮雞距子裡急後重腹痛便膿祕塞不爽久延交冬仍是腸滯不通法當宣通氣血紫菀厚朴炒黑地榆制軍桔梗木香炒黑楂肉炒青皮喑啞而痿者內經謂之喑痱此陽盛已衰入於陰也由勞傷其腎耗奪真陰當以內養為主非草木之藥所能挽回也河車大造丸狐疝者厥陰之痹也發則睪丸痛引少腹得嘔氣泄則止此屬寒濕之阻議以利濕溫經祛風丸方服久自愈川楝子小茴香淫羊藿胡蘆巴茯苓半夏杜仲韭子砂仁防風當歸漂淡蓯蓉泡淡吳茱萸雙合水泛丸日服二次每服二錢五分産後兩三日惡露即止下白甚多明系濕阻體虛感邪更瘧半月食減氣壅延久必致虛脫且擬補虛鎮墜以治氣逆氣降進食庶有生機代赭石煅旋覆花製半夏人參茯苓新會皮炒白芍又服煎湯逆氣已降飲食漸進有向愈之機然産後肝腎自虛若不填納恐沖氣覆逆大熟地砂仁炒鬆人參枸杞子炒炒白芍茯苓生杜仲又進填納神氣雖振寒熱未已白帶仍下濕鬱所致宜用開濕破瘀引邪以冀瘧止青蒿生鱉甲茯苓當歸炒桃仁新會皮生香附舌微黃口微酸苦脘中微悶議用溫膽法合四逆散竹茹生白芍炒半夏川連淡芩枳實汁桔梗目黃舌刺色赤伏邪餘熱未盡鮮生地麥冬川斛蔗汁竹葉心花粉鮮地骨皮梨汁陽明濕熱痞結心下擬苦降辛泄則邪自解耳泡乾薑半夏桔梗杏仁川連厚朴枳實豆豉至寶丹風溫化熱上郁肺氣咽喉阻塞胸脘不通故呻吟呼吸不爽上下交阻逆而為厥乃閉塞之甚病在上焦幼科消食發散表裡混治久延必致慢驚莫救蘆根飛滑石川通草甜水梨皮桑葉脈濡數中暑暑為陽邪晝屬陽分故張其勢而煩渴夜靜屬陰邪逼於內則多言囈語皆由體虛邪甚致此經謂暑傷氣原屬虛症未敢以凝寒苦清侵伐元氣絲瓜葉三片金石斛三錢白知母四錢飛滑石一錢水煎濾清候冷衝入西瓜汁一大茶杯凡三陽症邪未入里歸腑尚在散漫之時用承氣湯誤下之則熱不解而下利神虛妄言見矣擬苦清以通腑氣仍用葛根解肌開表斯成表裡兩解之法耳葛根黃芩黃連甘草脈浮緩身熱不止汗出不為汗衰此風濕鬱表瘀熱為黃擬麻黃連翹赤小豆湯麻黃杏仁生梓白皮生薑連翹細赤豆甘草大棗天雨水煎熱邪入里脘痞按之痛脈浮滑者此邪結陽分擬仲景小陷胸湯川黃連栝蔞實半夏杏仁枳實脈濡澀數至暮昏亂身熱未盡腹痛便黑陽明蓄血擬仲景桃仁承氣以逐其邪桂枝木大黃甘草芒硝丹皮桃仁身重汗出疼痛脈浮緩此風濕相搏於太陽之表陽虛邪客當通營衛以固表擬桂枝附子湯制川附桂枝甘草生薑大棗口苦惡熱腹滿虛煩汗出此陽明症也內經云邪中於面則入於膺而未全歸腑故有是症擬仲景梔子厚朴湯香豉梔子厚朴連翹枳殼脈沉微下利嘔逆身痛四肢厥冷少陰中寒應四逆湯急救其里生炮附子乾薑炙甘草脈微下利厥逆煩躁面赤戴陽顯然少陰症格陽於上也用白通去豬膽汁以膽汁亦損真陽也泡生附子乾薑蔥白煎好衝入人尿一杯病體已虛風溫再侵喘嗽身熱脘悶小便不利全是肺病此症反復太多深慮病傷成勞凡藥之苦味辛泄者慎用青蔗汁鮮枸杞根皮玉竹桑葉北沙參蜜炒知母炒川貝夏月感冒頭重壯熱無汗煩渴伏暑新涼外束治以辛香開表陳香薷新會皮厚朴藿香甘草知母舌縮語音不出呼吸似喘二便不通神迷如寐此少陰腎液先虧溫邪深陷陰中瘛痙已見厥陽內風上冒本質素怯邪伏殊甚實為棘手議護下焦之陰清解溫熱之深藏以冀萬一阿膠鮮生地元參鮮石菖蒲川黃連童子小便脈濡懶倦多汗口渴體氣素薄炎暑爍金當益氣保水之源麥冬人參知母五味子經月瘧邪仲景謂結為癥瘕者氣血交病病已入絡久必成滿脹瘧母膠固黏著又非峻攻可拔當遵仲景鱉甲煎丸之例日餌不費以搜絡邪鱉甲煎丸三百粒每服十粒日服二夜服一溫邪已入心營神煩欲昏質系陰虧怕其液涸不必以斑疹為慮清神斯邪不結蔽矣連翹心石菖蒲鮮生地元參心金銀花天竺黃至寶丹一粒病脅痛吐食內經謂肝痹又云少陽不足病肝痹得之寒濕柴胡防風當歸白芍萆薢米仁甘草茯苓寒熱而嘔罷則汗出四日一發牝瘧也瘧論云邪氣客於六腑而有時與衛氣相失不能相得故休四五日或數日乃作也今脈沉弦遲發必大吐大汗陽氣與中氣乏竭應扶陽補中以固元氣制川附人參炮薑炒白芍草果仁牡蠣炙甘草加大棗一枚善食而飢經謂疸成消中膏粱蘊熱過也禁芳草藥石藥石發癲芳草發狂耳自應清胃淡薄蔬食庶可獲愈蔞皮枳殼川連鬱金金石斛連翹焦神麯悲驚不樂神志傷也心火之衰陰氣乘之則多慘戚擬大建中揚桂枝人參蜀椒附子飴糖脈洪大煩渴汗出陽明中暍的系白虎湯候也石膏甘草麥冬知母粳米脈沉微腹痛吐利汗出太陰寒傷擬冷香飲子泡淡附子草果仁新會皮甘草煎好候冷服瘧母竊踞少陽氣血凝阻蜣螂金鈴子桃仁三稜蟅蟲歸身元胡索蓬朮韭汁丸肝虛內熱制首烏茯苓女貞實酒炙鱉甲歸身酒炒白芍香附酒炒青蒿子熬膏略加蜜搗丸述胸脘脹痞不飢不食大便溏滑已有五年夫胸中乃清氣轉旋清陽失運濁氣凝聚為患水穀氣蒸之濕濕勝遂成五泄陽氣日微宣脾陽可使氣機之運氣行濕自去耳生白朮益智仁真茅朮厚朴茯苓蓽撥廣木香新會皮寒熱咳嗽初起必有外邪邪陷入里則陽氣傷陰濁擾亂延為腫脹述腹脹大上實下堅濁自下起逆氣挾痰上衝暮則陰邪用事著枕咳嗆更甚本草云諸藥皮皆涼子皆降降肺氣疏胃滯暫時通泄昧於陰邪盛為腫為脹大旨形寒吐沫陽氣已寂湯藥以通太陽續進攝納少陰考諸前哲不越此範早服濟生腎氣丸晚進桂苓甘味薑附湯小産後肌肉似乎豐溢是陽氣發泄即外有餘內不足病樣甚多何堪縷治在女科莫重於調經氣血逆亂擾動肝脾心胸痛發而嘔述遇怒著冷痛甚胃陽已衰厥濁易逆先理胃陽用金匱法人參吳茱萸茯苓半夏良薑從未生育乃是氣血不和形軀豐溢是外盛內虧肌肉疹癢搔摸成塊風在表濕熱在裡乃是氣分之病病非大恙而取效最難明理之醫謂肥人不可多投攻表泄陽當於夏月施砭刺法可效生茅朮須生香附白殭蠶白蘚皮白芥子老蘇梗男子七旬下元脂液已少陽氣升騰陰少承供目恙先從左起肝主左升也血無內藏陽上蒸迫為障失明顯然水虧無以生木不足之症焉得用龍膽黃柏瀉火之理倘苦寒傷胃噬臍莫及羯羊肝穀精草浙菊花制首烏夜明砂濂珠粉枸杞子邪深入陰三日乃發間瘧至必腰腹中痛氣升即嘔所伏之邪必在肝絡動則犯胃故嘔逆煩渴肝乃木火內寄之臟胃屬陽土宜涼久聚變熱與初起溫散不同邪久不祛必結瘕形瘧母生鱉甲生桃仁知母滑石醋炒半夏草果仁高年疝症是下元虛氣冷凝沍結聚攻墜乃沉痼之疾藥難取效暖氣助陽鼓動俾陰邪濁氣稍解不過暫時小安耳病在肝腎道路紆遠藥必從咽入胃由胃入腸始達病所而上中無病之處必受疝藥攻克之纍倘胃減妨食何以救療夫陰濁盤踞成形例取純陽氣雄之藥昔胡大封翁高年宿疝用十全大補不效喻氏駁其半陰半陽非法議以薑附為丸參苓為衣喉間知有參苓過胃始露猛烈之威靈恪攻病所此議甚正生炮附子淡乾薑大茴香炒研為細末真水安息香三錢搗為小丸以人參末不拘多少為衣早服二錢少少進湯送下年方二七長者呵責受驚即起癇厥驚氣內應足厥陰肝述前先見頭搖病發仰極反弓是厥逆內風由前上胸起必喟然嘆者氣冒膻中神識自矇蔽也小溲通利得蘇者小腸赤府泄濁心包蒙神下降也是症當理手足厥陰諒施針刺以宣其絡服藥未易有功至寶丹半丸化服精氣不旺邪留腎絡不解大凡邪在陽可散入陰之邪必溫經可托出留邪為解之化之不同法也人參鹿茸鹿角霜舶茴香當歸細辛凡久病必入絡脈醫但寫藥湊方不明入絡之理藥由咽入過胃至腸而已此症由肝絡而來過膈入胃胃翻嘔吐致吐致脹之由從肝而出也偏勝病起務以急攻用藥如用兵直搗中堅使病潰散然非入絡之方弗能效矣議於病發之時疏理肝木病緩再安胃土人參厚朴茯苓熟半夏磨入蓬莪朮五分正當生旺之年須蒼色變按人身發屬心火而炎上眉主肝木而曲直側生須應腎水內不足而色不向榮且脈象弱芤男子精氣衰薄不為生育之徵法當寧心神以處靜寡欲養精妙選無病瘦弱女質經調怡悅無拘慮愁煩遵三十時辰兩日半之旨庶幾望其育麟耳肉蓯蓉蛇床子覆盆子線魚膠補骨脂舶茴香五味子菟絲子家韭子沙蒺藜滯痰阻經脈之氣瘀濁阻絡脈之血病甚難治每每經水將至之候必腹痛堅脹上年用烏骨雞丸堅脹勢緩痛減不時舉發今議治法經水來時用回生丹三四日經過用後方但主宣通絡血中氣可免脹滿之纍鹿角霜敗龜板生香附熟地炭南楂肉小茴香茅朮炭茯苓塊用鮑魚汁為丸咳嗆頻多必嘔吐涎沫明理者當知咳嗆自衝脈氣衝不司收攝為肝腎陰氣不足咽喉久痛者緣少陰厥陰脈循喉陽氣刻刻擾動無制多屬陰虧脈形細動不受溫補肺藥久進必傷胃口熟地炭女貞子湘蓮肉茯苓芡實川石斛炒山藥肺家留熱頻年嗆發據説痘後有此長夏諸陽升騰而黴天反燥當清肺之急迫潤肺之燥烈清阿膠枯黃芩南花粉地骨皮緑豆皮久熱五液全耗陰傷非謬頻渴安受梨蔗晡起寒熱倏然而至驗及舌色絳赤顯然由臟絡之空隙致陰反交戀其陽按經義從下交合難易速功肝腎病必纍及蹻維所致人參知母麋角膠元武板問生産頻多經水失期此衝脈厥氣直攻心下引脅環及少腹嘔吐黑水黑為胃底之水便出稀黑乃腸中之水經年纍月病傷胃憊何暇見病治病務在安眠進食為議仿仲景胃虛上逆例人參炒半夏代赭石茯苓塊降香蘇木據述布痘調理少和四五年來不分冬夏兩膝骨痛暮夜甚必越日乃解更述暖尉少安知寒濕陰氣從下而受但痘後幾更寒暑不愈經脈必有留邪之氣因新邪舉發論病名曰痹痹者氣血凝滯之義古方活絡逐邪每施於新感則效久則邪興氣血混處取效頗遲當此長夏發泄司令按圖針刺每五日七日一舉經絡氣血流行邪氣難以容留徒藥無益遵古方服活絡丹即再造丸國朝喻氏謂酒熱先入肝膽謹慎者飲之可以壯膽好飲多以致發瘡其酒毒頗得外泄以分其勢瘡愈癇搐厥逆全歸肝膽矣用藥以大苦大寒直清其下蘆薈青黛龍膽草郁李仁胡黃連黑山梔調入豬膽汁瘰癧從情志易怒而來久鬱氣火燔灼值産育頻經奇經八脈不固陽乘脈動經來如崩內經謂陰絡傷則內溢脈來虛數肌肉易熱陰乏不主內守浮陽擾越外翔形症及脈難用溫暖之藥平昔飲酒不喜甘味滋膩徒然參苓僅到中宮凡經水於由血海而下血海即衝脈自述腰髀痠楚其損已入奇經考宋元明諸賢人凡不受熱藥體質必用震靈丹以固下更佐能入諸經之品通攝兼進人參茯神女貞子天冬肉炙草旱蓮草炒枸杞炒當歸送眼震靈丹六十粒上年起病食物不甘美頭暈耳鳴足力痿軟年周甲子向老日衰下元二氣漸漓水乏生木之司液少則肝木內風鼓動木乘胃土必食無味風陽上巔攻竅上實下虛醫為腎虛萸地填陰原不為過但腎水內寓真火宜溫肝木相火宜涼凡益腎取乎溫養必佐諒肝以監製方無偏黨是症倘加暴怒煩勞必有卒中之纍戒酒肉濁味上氣肅清填下無痰火阻礙清間怡悅五志氣火不燃內起之病關係臟真不徒求治於藥也熟地石斛天冬菊炭巴戟肉肉蓯蓉沙蒺藜沙白芍懷牛膝線魚膠蜜丸打入青鹽四兩積勞陽動氣蒸上咳已三四年仍然經營辦事夏四月地中陽升途失血咽痛音低男子五旬以外下元先虧此顯然五液不充為久延不愈之沉疴見血見嗽與寒降清肺是夯極者生地黃清阿膠雞子黃雲茯苓麥冬桔梗問病起於功名未遂情志郁悖人身之氣左升右降怒必木火暴升肝膽橫逆肺反為木火乘侮金無制木之權呼吸病加絡血被氣火擾動亦令溢出上竅更加勤讀苦工身靜心動君相何由以寧春夏頻發地中氣升陽氣應之內起之病關係臟真情志安和庶病可卻丹皮鉤藤金斛白芍米仁蘇子藕汁真降香渴熱向愈自更衣用力陰囊忽大此宿疝舉發明明陰虛氣墜非子和七疝同法身前陷墜任脈失其擔任小便通調酸甘定議人參天冬熟地萸肉川石斛炙草酒毒內燔吐血甚多六七日後瘀血又從大便出酒性先入肝膽次及胃絡照一臟一腑對治勿驟用膩滯陰藥金石斛丹參穭豆皮銀花地骨皮丹皮黑山梔雲茯苓向來下部赤疥濕熱下注本乎質薄腎虛秋冬微感外邪肺氣失降氣隧為壅水穀氣蒸變濕氣阻橫漬經脈膀胱氣痹小溲不爽不司分別清濁濕墜大腸便稀痹塞自下壅逆及上喘息氣衝坐不得臥俯不喜仰甚於夜者濕與水皆陰邪暮夜陰用事也夫膀胱為腎腑宜開則水通濁泄初因外感太陽先受治不得其要領孟子謂水搏激過顙在人身逆而犯上射肺則肺痹喘息矣仲聖凡治外邪致動水寒上逆必用小青龍湯為主方與內經腫脹開鬼門取汗潔淨腑利水相符宗是議治麻黃八分桂枝一錢去皮白芍一錢杏仁十五粒去皮茯苓三錢甘草三分炙淡乾薑一錢同五味子一錢搗罨一夜上午服
